<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Glass Estimate — Fast Glass & Windows</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .pill { transition: all .12s; cursor: pointer; min-height: 44px; }
    .pill.on { background:#2563EB; color:#fff; border-color:#2563EB; }
    .pill.on .cat-label { color:#fff; }
    .card-sel {
      position: relative; transition: all .12s; cursor: pointer;
      min-height: 52px; max-height: 60px; overflow: hidden;
    }
    .card-sel.on { border-color:#2563EB; background:#EFF6FF; }
    .card-sel .radio-dot {
      position: absolute; top: 6px; right: 6px;
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid #D1D5DB; background: #fff;
    }
    .card-sel.on .radio-dot { border-color:#2563EB; background:#2563EB; }
    .card-sel.on .radio-dot::after {
      content:''; display:block; width:5px; height:5px;
      border-radius:50%; background:#fff; margin:2.5px auto;
    }
    .opt-btn { transition: all .12s; cursor: pointer; }
    .opt-btn.on { background:#2563EB; color:#fff; border-color:#2563EB; }
    .dim-frac { width: 72px; flex-shrink: 0; font-size: 11px; padding: 6px 4px; }
    .dim-in { flex: 1; min-width: 0; }
    .breakdown-row { display:flex; justify-content:space-between; padding:3px 0; font-size:11px; }
    .result-in { animation: ri .25s ease; }
    @keyframes ri { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen pb-8">

<!-- HEADER -->
<header class="bg-white border-b border-gray-200 sticky top-0 z-20 shadow-sm">
  <div class="max-w-lg mx-auto px-4 py-3 flex items-center justify-between">
    <div>
      <div class="font-bold text-gray-900 text-base">🪟 Glass Estimate</div>
      <div class="text-xs text-gray-400">Fast Glass & Windows · LA</div>
    </div>
    <a href="/admin" class="text-xs text-gray-400 hover:text-blue-600 px-2 py-1">⚙️</a>
  </div>
</header>

<div class="max-w-lg mx-auto px-3 pt-2 space-y-2">

  <!-- 1. CATEGORY — all 4 visible, no overflow -->
  <div class="bg-white rounded-xl border border-gray-200 p-2.5">
    <div class="text-[10px] font-semibold text-gray-400 uppercase tracking-wide mb-1.5">What?</div>
    <div class="grid grid-cols-4 gap-1.5" id="catGrid"></div>
  </div>

  <!-- 2. PRODUCT TYPE -->
  <div class="bg-white rounded-xl border border-gray-200 p-2.5" id="prodSection" style="display:none">
    <div class="text-[10px] font-semibold text-gray-400 uppercase tracking-wide mb-1.5">Type</div>
    <div class="grid grid-cols-2 gap-1.5" id="prodGrid"></div>
  </div>

  <!-- 3. OPTIONS — dynamic -->
  <div id="optArea"></div>

  <!-- 4. DIMENSIONS — inches only -->
  <div class="bg-white rounded-xl border border-gray-200 p-2.5" id="dimSection" style="display:none">
    <div class="text-[10px] font-semibold text-gray-400 uppercase tracking-wide mb-1.5">Dimensions</div>
    <div>
      <!-- Width: single row -->
      <div>
        <div class="text-[10px] text-gray-500 mb-1 font-medium">Width</div>
        <div class="flex items-center gap-1.5">
          <input id="wIn" type="number" min="1" max="300" value="24"
            class="dim-in text-center border border-gray-300 rounded-lg py-2 text-sm font-semibold">
          <span class="text-[10px] text-gray-400 flex-shrink-0">in</span>
          <select id="wFrac" class="dim-frac border border-gray-300 rounded-lg text-gray-700">
            <option value="0">+0"</option>
            <option value="1/8">+⅛"</option>
            <option value="1/4">+¼"</option>
            <option value="3/8">+⅜"</option>
            <option value="1/2" selected>+½"</option>
            <option value="5/8">+⅝"</option>
            <option value="3/4">+¾"</option>
            <option value="7/8">+⅞"</option>
          </select>
        </div>
      </div>
      <!-- Height: single row -->
      <div class="mt-2">
        <div class="text-[10px] text-gray-500 mb-1 font-medium">Height</div>
        <div class="flex items-center gap-1.5">
          <input id="hIn" type="number" min="1" max="300" value="36"
            class="dim-in text-center border border-gray-300 rounded-lg py-2 text-sm font-semibold">
          <span class="text-[10px] text-gray-400 flex-shrink-0">in</span>
          <select id="hFrac" class="dim-frac border border-gray-300 rounded-lg text-gray-700">
            <option value="0" selected>+0"</option>
            <option value="1/8">+⅛"</option>
            <option value="1/4">+¼"</option>
            <option value="3/8">+⅜"</option>
            <option value="1/2">+½"</option>
            <option value="5/8">+⅝"</option>
            <option value="3/4">+¾"</option>
            <option value="7/8">+⅞"</option>
          </select>
        </div>
      </div>
    </div>
    <div class="mt-2 bg-blue-50 border border-blue-200 rounded-lg px-2.5 py-1.5 text-xs text-blue-700 font-medium" id="areaPreview">Area: —</div>
    <div class="flex items-center gap-2 mt-1.5">
      <span class="text-[10px] text-gray-500">Qty</span>
      <input id="qty" type="number" min="1" max="50" value="1"
        class="w-14 text-center border border-gray-300 rounded-lg py-1 text-sm">
    </div>
  </div>

  <!-- 5. LOCATION & JOB -->
  <div class="bg-white rounded-xl border border-gray-200 p-2.5" id="jobSection" style="display:none">
    <div class="text-[10px] font-semibold text-gray-400 uppercase tracking-wide mb-1.5">Location & Details</div>

    <!-- ZIP -->
    <div class="flex gap-2 items-center mb-3">
      <input id="zip" type="text" placeholder="ZIP (e.g. 90210)" maxlength="5"
        class="flex-1 border border-gray-300 rounded-xl px-3 py-2 text-sm"
        oninput="onZip(this.value)">
      <div id="zipBadge" class="text-xs text-gray-500 whitespace-nowrap max-w-32 text-right leading-tight"></div>
    </div>

    <!-- Floor -->
    <div class="mb-2">
      <div class="text-[10px] text-gray-500 mb-1">Floor</div>
      <div class="grid grid-cols-3 gap-1.5">
        <button onclick="setOpt('floor',1,this)" class="opt-btn on border border-blue-600 bg-blue-600 text-white rounded-lg py-1.5 text-xs font-semibold">1st</button>
        <button onclick="setOpt('floor',2,this)" class="opt-btn border border-gray-200 text-gray-700 rounded-lg py-1.5 text-xs font-medium">2nd<br><span class="text-gray-400" style="font-size:9px">+$150</span></button>
        <button onclick="setOpt('floor',3,this)" class="opt-btn border border-gray-200 text-gray-700 rounded-lg py-1.5 text-xs font-medium">3rd+<br><span class="text-gray-400" style="font-size:9px">+$300</span></button>
      </div>
    </div>

    <!-- Techs -->
    <div class="mb-2.5">
      <div class="text-xs text-gray-500 mb-1">Technicians</div>
      <div class="flex gap-1.5">
        <button onclick="setOpt('techs',1,this)" class="opt-btn on border-2 border-blue-600 bg-blue-600 text-white rounded-xl w-12 py-2 text-sm font-bold">1</button>
        <button onclick="setOpt('techs',2,this)" class="opt-btn border-2 border-gray-200 text-gray-700 rounded-xl w-12 py-2 text-sm font-bold">2</button>
        <button onclick="setOpt('techs',3,this)" class="opt-btn border-2 border-gray-200 text-gray-700 rounded-xl w-12 py-2 text-sm font-bold">3</button>
      </div>
    </div>

    <!-- Urgency -->
    <div class="mb-2.5">
      <div class="text-xs text-gray-500 mb-1">Urgency</div>
      <div class="space-y-1.5">
        <button onclick="setOpt('urgency','normal',this)" class="opt-btn on w-full text-left border-2 border-blue-600 bg-blue-600 text-white rounded-xl px-3 py-2 text-sm font-medium">Standard <span class="opacity-70 text-xs">(3–5 days)</span></button>
        <button onclick="setOpt('urgency','urgent',this)" class="opt-btn w-full text-left border-2 border-gray-200 text-gray-700 rounded-xl px-3 py-2 text-sm font-medium">Same-Day <span class="text-orange-500 font-bold">+30%</span></button>
        <button onclick="setOpt('urgency','emergency',this)" class="opt-btn w-full text-left border-2 border-gray-200 text-gray-700 rounded-xl px-3 py-2 text-sm font-medium">Emergency <span class="text-red-500 font-bold">+50%</span></button>
      </div>
    </div>

    <textarea id="notes" rows="2" placeholder="Notes: outside patio, ladder, Beverly Hills..."
      class="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm resize-none" oninput="sched()"></textarea>
  </div>

  <!-- RESULT -->
  <div id="resultArea"></div>
  <div id="similarArea"></div>

</div><!-- end main -->

<script>
const API='';
const SVC={residential_single:1,residential_igu:2,residential_foggy:13,commercial_storefront:17,commercial_partition:19,commercial_door:23,shower_door:49,shower_mirror:50,specialty_tabletop:50,specialty_custom:3,specialty_laminated:6};
const HCP={residential_single:'single_pane',residential_igu:'double_pane_igu',residential_foggy:'double_pane_igu',commercial_storefront:'commercial_storefront',shower_door:'shower_door',shower_mirror:'mirror',specialty_tabletop:'custom_tempered',specialty_laminated:'laminated'};
const FRAC={'0':0,'1/8':.125,'1/4':.25,'3/8':.375,'1/2':.5,'5/8':.625,'3/4':.75,'7/8':.875};

let cats=[], prod=null, opts={}, state={floor:1,techs:1,urgency:'normal'}, timer=null;

async function init(){
  try{
    cats=await fj('/api/products');
    renderCats();
    bindDims();
  }catch(e){
    document.getElementById('catGrid').innerHTML='<div class="col-span-4 text-red-500 text-xs p-1">Server offline</div>';
  }
}

async function fj(path,o={}){const r=await fetch(API+path,o);if(!r.ok){const e=await r.json();throw new Error(e.detail||r.status);}return r.json();}

// ── CATEGORIES ────────────────────────────────────────
function renderCats(){
  const g=document.getElementById('catGrid');
  g.innerHTML='';
  cats.forEach(cat=>{
    const emoji=cat.category_label.split(' ')[0];
    const label=cat.category_label.slice(emoji.length).trim();
    // shorten labels for 4-col grid
    const short={Residential:'Resid.',Commercial:'Comm.','Shower & Bath':'Shower',Specialty:'Special'};
    const btn=document.createElement('button');
    btn.className='pill border border-gray-200 rounded-lg py-1.5 px-0.5 text-center';
    btn.innerHTML=`<div class="text-base leading-none">${emoji}</div><div class="cat-label text-[10px] font-medium text-gray-700 mt-0.5 leading-tight">${short[label]||label}</div>`;
    btn.onclick=()=>selCat(cat,btn);
    g.appendChild(btn);
  });
}

function selCat(cat,btn){
  document.querySelectorAll('.pill').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  prod=null; opts={};
  document.getElementById('optArea').innerHTML='';
  document.getElementById('dimSection').style.display='none';
  document.getElementById('jobSection').style.display='none';
  document.getElementById('resultArea').innerHTML='';
  document.getElementById('similarArea').innerHTML='';
  renderProds(cat.products);
  document.getElementById('prodSection').style.display='block';
}

function renderProds(ps){
  const g=document.getElementById('prodGrid');
  g.innerHTML='';
  ps.forEach(p=>{
    const btn=document.createElement('button');
    btn.className='card-sel border border-gray-200 rounded-lg px-2 py-1.5 pr-6 text-left';
    btn.innerHTML=`<div class="radio-dot"></div><div class="font-semibold text-gray-800 text-xs leading-tight truncate">${p.label}</div><div class="text-blue-600 font-semibold text-[10px] mt-0.5">$${p.price_per_sqft_min}–${p.price_per_sqft_max}/sf</div>`;
    btn.onclick=()=>selProd(p.id,btn);
    g.appendChild(btn);
  });
}

async function selProd(id,btn){
  document.querySelectorAll('.card-sel').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const d=await fj(`/api/products/${id}`);
  prod=d; opts={};
  (d.fields||[]).forEach(f=>{if(f.default)opts[f.id]=f.default;});
  renderOpts();
  document.getElementById('dimSection').style.display='block';
  document.getElementById('jobSection').style.display='block';
  setTimeout(()=>document.getElementById('dimSection').scrollIntoView({behavior:'smooth',block:'nearest'}),80);
  sched();
}

// ── OPTIONS ───────────────────────────────────────────
function renderOpts(){
  const area=document.getElementById('optArea');
  area.innerHTML='';
  if(!prod?.fields) return;
  prod.fields.forEach(field=>{
    if(field.show_if&&opts[field.show_if.field]!==field.show_if.value) return;
    const sec=document.createElement('div');
    sec.className='bg-white rounded-xl border border-gray-200 p-2.5';
    sec.innerHTML=`<div class="text-[10px] font-semibold text-gray-400 uppercase tracking-wide mb-1.5">${field.label}${field.note?`<span class="text-gray-300 font-normal normal-case ml-1">${field.note}</span>`:''}</div><div id="f_${field.id}"></div>`;
    area.appendChild(sec);
    const cont=document.getElementById(`f_${field.id}`);

    if(field.type==='radio'){
      if(field.options.length<=6){
        // Small pill buttons — wrap nicely
        const wrap=document.createElement('div');
        wrap.className='flex flex-wrap gap-1.5';
        field.options.forEach(o=>{
          const b=document.createElement('button');
          const on=opts[field.id]===o.value;
          const add=o.price_add_sqft||o.price_add_unit||o.price_add_lf||0;
          const badge=add>0?` <span class="text-xs opacity-70">+$${add}</span>`:add<0?` <span class="text-xs opacity-70">-$${Math.abs(add)}</span>`:'';
          b.className=`opt-btn border ${on?'border-blue-600 bg-blue-600 text-white':'border-gray-200 text-gray-700'} rounded-lg px-2.5 py-1 text-xs font-medium`;
          b.innerHTML=o.label+badge;
          b.onclick=()=>{opts[field.id]=o.value;renderOpts();sched();};
          wrap.appendChild(b);
        });
        cont.appendChild(wrap);
      } else {
        const sel=document.createElement('select');
        sel.className='w-full border border-gray-300 rounded-xl px-3 py-2 text-sm';
        field.options.forEach(o=>{
          const op=document.createElement('option');
          op.value=o.value; op.selected=opts[field.id]===o.value;
          const add=o.price_add_sqft||o.price_add_unit||0;
          op.textContent=o.label+(add>0?` +$${add}`:add<0?` -$${Math.abs(add)}`:'');
          sel.appendChild(op);
        });
        sel.onchange=()=>{opts[field.id]=sel.value;renderOpts();sched();};
        cont.appendChild(sel);
      }
    } else if(field.type==='checkbox'){
      if(!Array.isArray(opts[field.id])) opts[field.id]=[];
      field.options.forEach(o=>{
        const lbl=document.createElement('label');
        lbl.className='flex items-center gap-2 py-1.5 cursor-pointer border-b border-gray-50 last:border-0';
        const chk=opts[field.id].includes(o.value);
        lbl.innerHTML=`<input type="checkbox" ${chk?'checked':''} class="w-4 h-4 rounded text-blue-600 flex-shrink-0"><span class="text-sm text-gray-800 flex-1">${o.label}</span><span class="text-xs text-gray-400">+$${o.price_add_unit}</span>`;
        lbl.querySelector('input').onchange=e=>{
          if(!Array.isArray(opts[field.id])) opts[field.id]=[];
          if(e.target.checked) opts[field.id].push(o.value);
          else opts[field.id]=opts[field.id].filter(v=>v!==o.value);
          sched();
        };
        cont.appendChild(lbl);
      });
    }
  });
}

// ── DIMS ──────────────────────────────────────────────
function bindDims(){
  ['wIn','wFrac','hIn','hFrac','qty'].forEach(id=>{
    document.getElementById(id).addEventListener('input',()=>{updArea();sched();});
    document.getElementById(id).addEventListener('change',()=>{updArea();sched();});
  });
}

function updArea(){
  const w=parseFloat(document.getElementById('wIn').value||0)+FRAC[document.getElementById('wFrac').value];
  const h=parseFloat(document.getElementById('hIn').value||0)+FRAC[document.getElementById('hFrac').value];
  const q=parseInt(document.getElementById('qty').value)||1;
  if(w>0&&h>0){
    const a=(w/12*h/12*q).toFixed(2);
    const wF=document.getElementById('wFrac').value,hF=document.getElementById('hFrac').value;
    document.getElementById('areaPreview').textContent=
      `${document.getElementById('wIn').value}"${wF!='0'?' '+wF+'"':''} × ${document.getElementById('hIn').value}"${hF!='0'?' '+hF+'"':''}${q>1?' × '+q:''}  =  ${a} sq ft`;
  }
}

// ── ZIP ───────────────────────────────────────────────
let zipT;
function onZip(v){
  clearTimeout(zipT);
  if(v.length!==5){document.getElementById('zipBadge').textContent='';return;}
  zipT=setTimeout(async()=>{
    try{
      const d=await fj(`/api/zip/${v}`);
      const m=d.multiplier>1?`+${Math.round((d.multiplier-1)*100)}%`:'';
      document.getElementById('zipBadge').innerHTML=`<span class="text-blue-600 font-medium">${d.city}</span>${m?`<br><span class="text-orange-500">${m} area</span>`:''}`;
      sched();
    }catch{}
  },500);
}

// ── CHOICE BUTTONS ────────────────────────────────────
function setOpt(key,val,btn){
  state[key]=val;
  btn.closest('div').querySelectorAll('.opt-btn').forEach(b=>{
    b.classList.remove('on','bg-blue-600','text-white','border-blue-600');
    b.classList.add('border-gray-200','text-gray-700');
  });
  btn.classList.add('on','bg-blue-600','text-white','border-blue-600');
  btn.classList.remove('border-gray-200','text-gray-700');
  sched();
}

// ── CALCULATE ─────────────────────────────────────────
function sched(){
  clearTimeout(timer);
  if(!prod) return;
  const w=parseFloat(document.getElementById('wIn').value||0);
  const h=parseFloat(document.getElementById('hIn').value||0);
  if(w<1||h<1) return;
  document.getElementById('resultArea').innerHTML=
    '<div class="bg-white rounded-xl border border-gray-200 p-3 text-center"><div class="animate-pulse text-blue-400">⏳</div><div class="text-[10px] text-gray-400 mt-1">Calculating...</div></div>';
  timer=setTimeout(doCalc,400);
}

async function doCalc(){
  if(!prod) return;
  const body={
    service_id:SVC[prod.id]||1,
    width_ft:0,
    width_in:parseInt(document.getElementById('wIn').value)||0,
    width_frac:document.getElementById('wFrac').value,
    height_ft:0,
    height_in:parseInt(document.getElementById('hIn').value)||0,
    height_frac:document.getElementById('hFrac').value,
    quantity:parseInt(document.getElementById('qty').value)||1,
    zip_code:document.getElementById('zip').value||'91324',
    floor:state.floor,
    num_technicians:state.techs,
    urgency:state.urgency,
    modifier_ids:[],
    notes:document.getElementById('notes').value,
  };
  try{
    const d=await fj('/api/calculate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    showResult(d);
    loadSim(HCP[prod.id]||'single_pane',d.total_area_sqft);
  }catch(e){
    document.getElementById('resultArea').innerHTML=`<div class="bg-red-50 border border-red-200 rounded-xl p-2.5 text-red-700 text-xs">❌ ${e.message}</div>`;
  }
}

function showResult(d){
  const notes=(d.notes||[]).filter(n=>n).map(n=>`<div class="text-xs text-orange-600 mt-1">⚠️ ${n}</div>`).join('');
  document.getElementById('resultArea').innerHTML=`
  <div class="result-in bg-white rounded-xl border-2 border-blue-600 p-3 shadow-sm">
    <div class="text-[10px] text-gray-500 mb-0.5">${d.service_name} · ${d.total_area_sqft} sqft · ${d.location||'Local'}</div>
    <div class="text-3xl font-bold text-blue-600 leading-tight">$${d.grand_total_min.toLocaleString()} – $${d.grand_total_max.toLocaleString()}</div>
    <div class="text-[10px] text-gray-400 mb-2">incl. LA tax 10.25%</div>
    <div class="bg-gray-50 rounded-lg p-2 mb-2">
      <div class="breakdown-row"><span class="text-gray-500">Material</span><span class="font-medium">$${d.breakdown.material_min.toFixed(0)}–$${d.breakdown.material_max.toFixed(0)}</span></div>
      <div class="breakdown-row"><span class="text-gray-500">Labor</span><span class="font-medium">$${d.breakdown.labor_min.toFixed(0)}–$${d.breakdown.labor_max.toFixed(0)}</span></div>
      ${d.breakdown.travel_cost>0?`<div class="breakdown-row"><span class="text-gray-500">Travel</span><span>$${d.breakdown.travel_cost.toFixed(0)}</span></div>`:''}
      ${d.breakdown.floor_surcharge>0?`<div class="breakdown-row text-orange-600"><span>Floor</span><span>+$${d.breakdown.floor_surcharge}</span></div>`:''}
      ${d.breakdown.extra_tech_cost>0?`<div class="breakdown-row text-orange-600"><span>Extra tech</span><span>+$${d.breakdown.extra_tech_cost.toFixed(0)}</span></div>`:''}
      ${d.breakdown.urgency_label?`<div class="text-orange-500 text-[10px] py-0.5">${d.breakdown.urgency_label}</div>`:''}
      <div class="breakdown-row border-t border-gray-200 pt-1 font-semibold"><span>Subtotal</span><span>$${d.total_min.toFixed(0)}–$${d.total_max.toFixed(0)}</span></div>
      <div class="breakdown-row text-gray-400"><span>Tax</span><span>$${d.tax_min.toFixed(0)}–$${d.tax_max.toFixed(0)}</span></div>
    </div>
    ${notes}
    <div class="flex gap-1.5">
      <button onclick="copyRes()" class="flex-1 bg-blue-600 text-white rounded-lg py-2 text-xs font-semibold">📋 Copy</button>
      <button onclick="window.print()" class="flex-1 border border-gray-300 text-gray-700 rounded-lg py-2 text-xs">🖨</button>
    </div>
  </div>`;
  window._r=d; window._rl=d.service_name;
}

async function loadSim(cat,area){
  const el=document.getElementById('similarArea');
  if(!cat||!area||area<0.3){el.innerHTML='';return;}
  try{
    const jobs=await fj(`/api/similar-jobs?category=${cat}&area_sqft=${area}`);
    if(!jobs.length){el.innerHTML='';return;}
    const rows=jobs.map(j=>`<tr class="border-b border-amber-100 last:border-0"><td class="py-1.5 pr-2 text-xs text-gray-600 font-medium">#${j.invoice}</td><td class="py-1.5 pr-2 text-xs">${j.area_sqft}sf</td><td class="py-1.5 pr-2 text-xs font-bold text-blue-700">$${j.price.toLocaleString()}</td><td class="py-1.5 text-xs text-gray-400">${j.zip_code||''} ${j.date?j.date.slice(0,7):''}</td></tr><tr><td colspan="4" class="pb-2 text-xs text-gray-400 leading-tight">${j.description.slice(0,80)}</td></tr>`).join('');
    el.innerHTML=`<div class="bg-amber-50 border border-amber-200 rounded-2xl p-3"><div class="text-xs font-semibold text-amber-800 mb-2">📋 Similar past jobs (${jobs.length})</div><table class="w-full">${rows}</table></div>`;
  }catch{}
}

function copyRes(){
  const d=window._r;if(!d)return;
  navigator.clipboard.writeText(`ESTIMATE — ${window._rl}\n${d.total_area_sqft} sqft | ${d.location}\nMaterial: $${d.breakdown.material_min}–$${d.breakdown.material_max}\nLabor: $${d.breakdown.labor_min}–$${d.breakdown.labor_max}\nTOTAL: $${d.total_min}–$${d.total_max}\nWith tax: $${d.grand_total_min}–$${d.grand_total_max}\n\nFast Glass & Windows — 213-566-8886`).then(()=>{event.target.textContent='✅';setTimeout(()=>event.target.textContent='📋 Copy',1500);});
}

init();
</script>
</body>
</html>
