<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glass Estimator — Fast Glass & Windows</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .cat-btn.active  { background:#2563EB; color:#fff; border-color:#2563EB; }
    .prod-btn.active { background:#EFF6FF; border-color:#2563EB; color:#1D4ED8; }
    .opt-btn { min-height:44px; transition:all .15s; cursor:pointer; }
    .opt-btn.active { background:#2563EB; color:#fff; border-color:#2563EB; }
    .result-box { animation: fadeIn .3s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

<header class="bg-white border-b border-gray-200 sticky top-0 z-10 shadow-sm">
  <div class="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
    <div>
      <h1 class="text-lg font-bold text-gray-900">🪟 Glass Estimator</h1>
      <p class="text-xs text-gray-400">Fast Glass & Windows — Internal Tool</p>
    </div>
    <a href="/admin" class="text-xs text-gray-400 hover:text-blue-600">⚙️ Admin</a>
  </div>
</header>

<main class="max-w-2xl mx-auto px-4 py-5 space-y-4">

  <!-- STEP 1: Category -->
  <section class="bg-white rounded-xl border border-gray-200 p-4">
    <div class="flex items-center gap-2 mb-3">
      <span class="w-7 h-7 rounded-full bg-blue-600 text-white text-xs font-bold flex items-center justify-center flex-shrink-0">1</span>
      <h2 class="font-semibold text-gray-800">What needs to be done?</h2>
    </div>
    <div class="grid grid-cols-2 gap-2" id="catGrid"></div>
  </section>

  <!-- STEP 2: Product Type -->
  <section class="bg-white rounded-xl border border-gray-200 p-4" id="prodSection">
    <div class="flex items-center gap-2 mb-3">
      <span class="w-7 h-7 rounded-full bg-blue-600 text-white text-xs font-bold flex items-center justify-center flex-shrink-0">2</span>
      <h2 class="font-semibold text-gray-800">Select type</h2>
    </div>
    <div id="prodGrid" class="text-sm text-gray-400">← Select a category first</div>
  </section>

  <!-- STEP 3: Options (dynamic) -->
  <div id="optionsArea"></div>

  <!-- STEP 4: Dimensions -->
  <section class="bg-white rounded-xl border border-gray-200 p-4" id="dimSection" style="display:none">
    <div class="flex items-center gap-2 mb-4">
      <span class="w-7 h-7 rounded-full bg-blue-600 text-white text-xs font-bold flex items-center justify-center flex-shrink-0" id="dimStepNum">4</span>
      <h2 class="font-semibold text-gray-800">Dimensions</h2>
    </div>
    <div class="grid grid-cols-2 gap-4 mb-3">
      <div>
        <p class="text-xs font-semibold text-gray-500 uppercase mb-2">Width</p>
        <div class="flex items-center gap-1 mb-1">
          <input type="number" id="wFt" min="0" max="50" value="0" class="w-14 text-center border border-gray-300 rounded-lg py-2 text-base">
          <span class="text-sm text-gray-500">ft</span>
        </div>
        <div class="flex items-center gap-1 mb-1">
          <input type="number" id="wIn" min="0" max="11" value="24" class="w-14 text-center border border-gray-300 rounded-lg py-2 text-base">
          <span class="text-sm text-gray-500">in</span>
        </div>
        <select id="wFrac" class="w-full border border-gray-300 rounded-lg px-2 py-2 text-sm">
          <option value="0">+ 0</option><option value="1/8">+ 1/8"</option>
          <option value="1/4">+ 1/4"</option><option value="3/8">+ 3/8"</option>
          <option value="1/2" selected>+ 1/2"</option><option value="5/8">+ 5/8"</option>
          <option value="3/4">+ 3/4"</option><option value="7/8">+ 7/8"</option>
        </select>
      </div>
      <div>
        <p class="text-xs font-semibold text-gray-500 uppercase mb-2">Height</p>
        <div class="flex items-center gap-1 mb-1">
          <input type="number" id="hFt" min="0" max="50" value="0" class="w-14 text-center border border-gray-300 rounded-lg py-2 text-base">
          <span class="text-sm text-gray-500">ft</span>
        </div>
        <div class="flex items-center gap-1 mb-1">
          <input type="number" id="hIn" min="0" max="11" value="36" class="w-14 text-center border border-gray-300 rounded-lg py-2 text-base">
          <span class="text-sm text-gray-500">in</span>
        </div>
        <select id="hFrac" class="w-full border border-gray-300 rounded-lg px-2 py-2 text-sm">
          <option value="0" selected>+ 0</option><option value="1/8">+ 1/8"</option>
          <option value="1/4">+ 1/4"</option><option value="3/8">+ 3/8"</option>
          <option value="1/2">+ 1/2"</option><option value="5/8">+ 5/8"</option>
          <option value="3/4">+ 3/4"</option><option value="7/8">+ 7/8"</option>
        </select>
      </div>
    </div>
    <div class="bg-gray-50 rounded-lg px-3 py-2 text-sm text-gray-600 mb-3" id="areaPreview">Area: —</div>
    <div class="flex items-center gap-3">
      <label class="text-sm font-medium text-gray-700">Qty:</label>
      <input type="number" id="qty" min="1" max="100" value="1" class="w-20 text-center border border-gray-300 rounded-lg py-2 text-base">
    </div>
  </section>

  <!-- STEP 5: Location & Job -->
  <section class="bg-white rounded-xl border border-gray-200 p-4" id="jobSection" style="display:none">
    <div class="flex items-center gap-2 mb-4">
      <span class="w-7 h-7 rounded-full bg-blue-600 text-white text-xs font-bold flex items-center justify-center flex-shrink-0" id="jobStepNum">5</span>
      <h2 class="font-semibold text-gray-800">Location & Job Details</h2>
    </div>

    <!-- ZIP -->
    <div class="mb-4">
      <label class="text-xs font-semibold text-gray-500 uppercase mb-1 block">ZIP Code</label>
      <input type="text" id="zip" placeholder="e.g. 90210" maxlength="5"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-base"
        oninput="lookupZip(this.value)">
      <div id="zipInfo" class="text-sm text-gray-500 mt-1 min-h-5"></div>
    </div>

    <!-- Floor -->
    <div class="mb-4">
      <label class="text-xs font-semibold text-gray-500 uppercase mb-2 block">Floor</label>
      <div class="flex gap-2">
        <button onclick="setFloor(1,this)" class="opt-btn active flex-1 border-2 border-blue-600 bg-blue-600 text-white rounded-lg py-2 text-sm font-medium">1st</button>
        <button onclick="setFloor(2,this)" class="opt-btn flex-1 border-2 border-gray-300 text-gray-700 rounded-lg py-2 text-sm font-medium">2nd +$150</button>
        <button onclick="setFloor(3,this)" class="opt-btn flex-1 border-2 border-gray-300 text-gray-700 rounded-lg py-2 text-sm font-medium">3rd+ +$300</button>
      </div>
    </div>

    <!-- Techs -->
    <div class="mb-4">
      <label class="text-xs font-semibold text-gray-500 uppercase mb-2 block">Technicians</label>
      <div class="flex gap-2">
        <button onclick="setTechs(1,this)" class="opt-btn active w-16 border-2 border-blue-600 bg-blue-600 text-white rounded-lg py-2 text-sm font-bold">1</button>
        <button onclick="setTechs(2,this)" class="opt-btn w-16 border-2 border-gray-300 text-gray-700 rounded-lg py-2 text-sm font-bold">2</button>
        <button onclick="setTechs(3,this)" class="opt-btn w-16 border-2 border-gray-300 text-gray-700 rounded-lg py-2 text-sm font-bold">3</button>
      </div>
    </div>

    <!-- Urgency -->
    <div class="mb-4">
      <label class="text-xs font-semibold text-gray-500 uppercase mb-2 block">Urgency</label>
      <div class="space-y-2">
        <button onclick="setUrgency('normal',this)" class="opt-btn active w-full text-left px-4 py-2 border-2 border-blue-600 bg-blue-600 text-white rounded-lg text-sm font-medium">Standard (3–5 days)</button>
        <button onclick="setUrgency('urgent',this)" class="opt-btn w-full text-left px-4 py-2 border-2 border-gray-300 text-gray-700 rounded-lg text-sm font-medium">Same-Day <span class="text-orange-500 font-bold">+30%</span></button>
        <button onclick="setUrgency('emergency',this)" class="opt-btn w-full text-left px-4 py-2 border-2 border-gray-300 text-gray-700 rounded-lg text-sm font-medium">Emergency / After Hours <span class="text-red-500 font-bold">+50%</span></button>
      </div>
    </div>

    <!-- Notes -->
    <div>
      <label class="text-xs font-semibold text-gray-500 uppercase mb-1 block">Notes</label>
      <textarea id="notes" rows="2" placeholder="Outside patio, ladder needed, Beverly Hills estate..."
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm resize-none"></textarea>
    </div>
  </section>

  <!-- CALCULATE -->
  <button id="calcBtn" onclick="doCalculate()" style="display:none"
    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl text-lg shadow-md transition-colors">
    💰 Calculate Price
  </button>

  <!-- SIMILAR JOBS -->
  <div id="similarJobs"></div>

  <!-- RESULT -->
  <div id="result"></div>
  <div class="h-8"></div>

</main>

<script>
const API = '';
let allCategories = [];
let currentProduct = null;
let currentOptions = {};   // fieldId → selected value
let floor = 1, techs = 1, urgency = 'normal';
let stepOffset = 0;

// ── INIT ──────────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch(`${API}/api/products`);
    allCategories = await res.json();
    renderCategories();
  } catch(e) {
    document.getElementById('catGrid').innerHTML = '<div class="col-span-2 text-red-500 text-sm">Server offline. Run: cd backend && python3 -m uvicorn main:app --port 8001</div>';
  }
}

// ── CATEGORIES ────────────────────────────────────────────────
function renderCategories() {
  const g = document.getElementById('catGrid');
  g.innerHTML = '';
  allCategories.forEach(cat => {
    const b = document.createElement('button');
    b.className = 'cat-btn border-2 border-gray-200 rounded-xl px-3 py-3 text-left transition-all';
    b.innerHTML = `<div class="text-2xl mb-1">${cat.category_label.split(' ')[0]}</div>
                   <div class="text-sm font-semibold text-gray-800">${cat.category_label.substring(2)}</div>
                   <div class="text-xs text-gray-400 mt-0.5">${cat.products.length} types</div>`;
    b.onclick = () => selectCategory(cat, b);
    g.appendChild(b);
  });
}

function selectCategory(cat, btn) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentProduct = null;
  currentOptions = {};
  document.getElementById('optionsArea').innerHTML = '';
  document.getElementById('dimSection').style.display = 'none';
  document.getElementById('jobSection').style.display = 'none';
  document.getElementById('calcBtn').style.display = 'none';
  document.getElementById('result').innerHTML = '';
  renderProducts(cat.products);
}

// ── PRODUCTS ──────────────────────────────────────────────────
function renderProducts(products) {
  const g = document.getElementById('prodGrid');
  g.innerHTML = '';
  products.forEach(p => {
    const b = document.createElement('button');
    b.className = 'prod-btn w-full text-left border-2 border-gray-200 rounded-xl px-4 py-3 mb-2 transition-all';
    b.innerHTML = `<div class="flex items-start justify-between gap-2">
      <div>
        <div class="font-semibold text-gray-800 text-sm">${p.label}</div>
        <div class="text-xs text-gray-400 mt-0.5">${p.description}</div>
      </div>
      <div class="text-right flex-shrink-0">
        <div class="text-blue-600 font-bold text-sm">$${p.price_per_sqft_min}–$${p.price_per_sqft_max}</div>
        <div class="text-xs text-gray-400">/sqft</div>
      </div>
    </div>`;
    b.onclick = () => selectProduct(p.id, b);
    g.appendChild(b);
  });
}

async function selectProduct(id, btn) {
  document.querySelectorAll('.prod-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const res = await fetch(`${API}/api/products/${id}`);
  currentProduct = await res.json();
  currentOptions = {};
  // set defaults
  (currentProduct.fields||[]).forEach(f => {
    if (f.default) currentOptions[f.id] = f.default;
  });
  renderOptions();
  document.getElementById('dimSection').style.display = 'block';
  document.getElementById('jobSection').style.display = 'block';
  document.getElementById('calcBtn').style.display = 'block';
  document.getElementById('dimSection').scrollIntoView({behavior:'smooth', block:'nearest'});
}

// ── OPTIONS ───────────────────────────────────────────────────
function renderOptions() {
  const area = document.getElementById('optionsArea');
  area.innerHTML = '';
  if (!currentProduct || !currentProduct.fields) return;

  let stepNum = 3;
  currentProduct.fields.forEach(field => {
    // show_if logic
    if (field.show_if) {
      const dep = field.show_if;
      if (currentOptions[dep.field] !== dep.value) return;
    }

    const section = document.createElement('section');
    section.className = 'bg-white rounded-xl border border-gray-200 p-4';
    section.dataset.fieldId = field.id;

    const note = field.note ? `<p class="text-xs text-gray-400 mb-2">${field.note}</p>` : '';

    section.innerHTML = `
      <div class="flex items-center gap-2 mb-3">
        <span class="w-7 h-7 rounded-full bg-blue-600 text-white text-xs font-bold flex items-center justify-center flex-shrink-0">${stepNum++}</span>
        <h2 class="font-semibold text-gray-800">${field.label}</h2>
      </div>
      ${note}
      <div class="space-y-2" id="opts_${field.id}"></div>`;

    area.appendChild(section);

    const container = document.getElementById(`opts_${field.id}`);

    if (field.type === 'radio') {
      field.options.forEach(opt => {
        const b = document.createElement('button');
        b.className = `opt-btn w-full text-left border-2 rounded-xl px-4 py-2.5 text-sm font-medium transition-all ${currentOptions[field.id] === opt.value ? 'border-blue-600 bg-blue-600 text-white' : 'border-gray-200 text-gray-700'}`;
        // build price badge
        let badge = '';
        const adds = [opt.price_add_sqft, opt.price_add_unit, opt.price_add_lf, opt.labor_add].filter(v => v > 0);
        const subs = [opt.price_add_sqft, opt.price_add_unit, opt.price_add_lf, opt.labor_add].filter(v => v < 0);
        if (adds.length) badge = `<span class="ml-auto text-xs opacity-80">+$${adds[0]}${opt.price_add_sqft ? '/sqft' : opt.price_add_unit ? '' : opt.price_add_lf ? '/lf' : ''}</span>`;
        if (subs.length) badge = `<span class="ml-auto text-xs opacity-80">-$${Math.abs(subs[0])}${opt.price_add_sqft ? '/sqft' : ''}</span>`;

        b.innerHTML = `<div class="flex items-center justify-between">${opt.label}${badge}</div>`;
        b.onclick = () => {
          currentOptions[field.id] = opt.value;
          // re-render to handle show_if
          renderOptions();
        };
        container.appendChild(b);
      });
    } else if (field.type === 'checkbox') {
      if (!currentOptions[field.id]) currentOptions[field.id] = [];
      field.options.forEach(opt => {
        const checked = (currentOptions[field.id]||[]).includes(opt.value);
        const label = document.createElement('label');
        label.className = 'flex items-center gap-3 py-2 cursor-pointer border-b border-gray-100 last:border-0';
        label.innerHTML = `
          <input type="checkbox" ${checked?'checked':''} class="w-5 h-5 rounded text-blue-600 flex-shrink-0">
          <span class="text-sm font-medium text-gray-800 flex-1">${opt.label}</span>
          <span class="text-sm text-gray-500">+$${opt.price_add_unit}</span>`;
        label.querySelector('input').onchange = (e) => {
          if (!currentOptions[field.id]) currentOptions[field.id] = [];
          if (e.target.checked) {
            currentOptions[field.id].push(opt.value);
          } else {
            currentOptions[field.id] = currentOptions[field.id].filter(v => v !== opt.value);
          }
        };
        container.appendChild(label);
      });
    }
  });

  // update step numbers on dim/job sections
  const totalOptSteps = document.querySelectorAll('#optionsArea section').length;
  document.getElementById('dimStepNum').textContent = 3 + totalOptSteps;
  document.getElementById('jobStepNum').textContent = 4 + totalOptSteps;
}

// ── AREA PREVIEW ──────────────────────────────────────────────
function calcArea() {
  const fm = {'0':0,'1/8':0.125,'1/4':0.25,'3/8':0.375,'1/2':0.5,'5/8':0.625,'3/4':0.75,'7/8':0.875};
  const w = (parseInt(document.getElementById('wFt').value)||0)*12 + (parseInt(document.getElementById('wIn').value)||0) + fm[document.getElementById('wFrac').value];
  const h = (parseInt(document.getElementById('hFt').value)||0)*12 + (parseInt(document.getElementById('hIn').value)||0) + fm[document.getElementById('hFrac').value];
  const q = parseInt(document.getElementById('qty').value)||1;
  if (w>0 && h>0) {
    const a = (w/12 * h/12 * q).toFixed(2);
    const wFt = document.getElementById('wFt').value, wIn = document.getElementById('wIn').value, wFr = document.getElementById('wFrac').value;
    const hFt = document.getElementById('hFt').value, hIn = document.getElementById('hIn').value, hFr = document.getElementById('hFrac').value;
    const ws = `${+wFt>0?wFt+'ft ':''}${wIn}"${wFr!='0'?' '+wFr+'"':''}`;
    const hs = `${+hFt>0?hFt+'ft ':''}${hIn}"${hFr!='0'?' '+hFr+'"':''}`;
    document.getElementById('areaPreview').textContent = `${ws} × ${hs}${q>1?' × '+q+' pcs':''} = ${a} sq ft`;
  }
}
['wFt','wIn','wFrac','hFt','hIn','hFrac','qty'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('input', calcArea);
  el.addEventListener('change', calcArea);
});

// ── ZIP ───────────────────────────────────────────────────────
let zipTimer;
async function lookupZip(zip) {
  clearTimeout(zipTimer);
  if (zip.length !== 5) { document.getElementById('zipInfo').textContent=''; return; }
  zipTimer = setTimeout(async () => {
    try {
      const d = await (await fetch(`${API}/api/zip/${zip}`)).json();
      const m = d.multiplier>1 ? ` • +${Math.round((d.multiplier-1)*100)}% area rate` : '';
      document.getElementById('zipInfo').innerHTML = `📍 <strong>${d.city}</strong> • ~${d.travel_minutes} min drive${m}`;
    } catch(e) {}
  }, 600);
}

// ── FLOOR / TECHS / URGENCY ───────────────────────────────────
function setFloor(n, btn) {
  floor = n;
  document.querySelectorAll('.opt-btn[onclick^="setFloor"]').forEach(b => { b.classList.remove('active','bg-blue-600','text-white','border-blue-600'); b.classList.add('border-gray-300','text-gray-700'); });
  btn.classList.add('active','bg-blue-600','text-white','border-blue-600'); btn.classList.remove('border-gray-300','text-gray-700');
}
function setTechs(n, btn) {
  techs = n;
  document.querySelectorAll('.opt-btn[onclick^="setTechs"]').forEach(b => { b.classList.remove('active','bg-blue-600','text-white','border-blue-600'); b.classList.add('border-gray-300','text-gray-700'); });
  btn.classList.add('active','bg-blue-600','text-white','border-blue-600'); btn.classList.remove('border-gray-300','text-gray-700');
}
function setUrgency(u, btn) {
  urgency = u;
  document.querySelectorAll('.opt-btn[onclick^="setUrgency"]').forEach(b => { b.classList.remove('active','bg-blue-600','text-white','border-blue-600'); b.classList.add('border-gray-300','text-gray-700'); });
  btn.classList.add('active','bg-blue-600','text-white','border-blue-600'); btn.classList.remove('border-gray-300','text-gray-700');
}

// ── CALCULATE ─────────────────────────────────────────────────
async function doCalculate() {
  if (!currentProduct) { alert('Select a product type first'); return; }
  const btn = document.getElementById('calcBtn');
  btn.textContent = '⏳ Calculating...'; btn.disabled = true;

  // Build product-specific options string for notes
  const optSummary = Object.entries(currentOptions)
    .map(([k,v]) => Array.isArray(v) ? `${k}: ${v.join('+')}` : `${k}: ${v}`)
    .join(', ');

  // Map new product to old service_id (use first match or default)
  const serviceMap = {
    'residential_single':    1,
    'residential_igu':       2,
    'residential_foggy':     13,
    'commercial_storefront': 17,
    'commercial_partition':  19,
    'commercial_door':       23,
    'shower_door':           49,
    'shower_mirror':         50,
    'specialty_tabletop':    50,
    'specialty_custom':      3,
    'specialty_laminated':   6,
  };

  const body = {
    service_id: serviceMap[currentProduct.id] || 1,
    width_ft: parseInt(document.getElementById('wFt').value)||0,
    width_in: parseInt(document.getElementById('wIn').value)||0,
    width_frac: document.getElementById('wFrac').value,
    height_ft: parseInt(document.getElementById('hFt').value)||0,
    height_in: parseInt(document.getElementById('hIn').value)||0,
    height_frac: document.getElementById('hFrac').value,
    quantity: parseInt(document.getElementById('qty').value)||1,
    zip_code: document.getElementById('zip').value || '91324',
    floor, num_technicians: techs, urgency,
    modifier_ids: [],
    notes: `${optSummary} | ${document.getElementById('notes').value}`,
  };

  try {
    const res = await fetch(`${API}/api/calculate`, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
    if (!res.ok) throw new Error((await res.json()).detail);
    const result = await res.json();
    showResult(result, currentProduct.label);
    // Load similar jobs
    const catMap = {
      'residential_single': 'single_pane',
      'residential_igu': 'double_pane_igu',
      'residential_foggy': 'double_pane_igu',
      'commercial_storefront': 'commercial_storefront',
      'shower_door': 'shower_door',
      'shower_mirror': 'mirror',
      'specialty_tabletop': 'custom_tempered',
      'specialty_laminated': 'laminated',
    };
    const hcpCat = catMap[currentProduct.id] || 'single_pane';
    await loadSimilarJobs(hcpCat, result.total_area_sqft);
  } catch(e) {
    document.getElementById('result').innerHTML = `<div class="bg-red-50 border border-red-200 rounded-xl p-4 text-red-700 text-sm">❌ ${e.message}</div>`;
  }
  btn.textContent = '💰 Calculate Price'; btn.disabled = false;
  document.getElementById('result').scrollIntoView({behavior:'smooth'});
}

function showResult(d, label) {
  const opts = Object.entries(currentOptions)
    .filter(([k,v]) => v && v !== '' && !(Array.isArray(v) && v.length===0))
    .map(([k,v]) => `<span class="inline-block bg-gray-100 text-gray-600 text-xs rounded px-2 py-0.5 mr-1 mb-1">${Array.isArray(v)?v.join('+'):v}</span>`)
    .join('');

  const notes = d.notes.filter(n=>n).map(n=>`<li class="text-sm">${n}</li>`).join('');

  document.getElementById('result').innerHTML = `
    <div class="result-box bg-white rounded-xl border-2 border-blue-600 p-5 shadow-md">
      <p class="text-sm text-gray-500 mb-1">${label} • ${d.total_area_sqft} sqft • ${d.location||'Local'}</p>
      <div class="mb-1">${opts}</div>
      <div class="text-3xl font-bold text-blue-600 mb-0.5">$${d.grand_total_min.toLocaleString()} – $${d.grand_total_max.toLocaleString()}</div>
      <p class="text-xs text-gray-400 mb-4">includes LA tax 10.25%</p>

      <div class="bg-gray-50 rounded-lg p-3 space-y-1.5 text-sm mb-4">
        <div class="flex justify-between"><span class="text-gray-500">Material</span><span>$${d.breakdown.material_min.toFixed(0)} – $${d.breakdown.material_max.toFixed(0)}</span></div>
        <div class="flex justify-between"><span class="text-gray-500">Labor</span><span>$${d.breakdown.labor_min.toFixed(0)} – $${d.breakdown.labor_max.toFixed(0)}</span></div>
        ${d.breakdown.travel_cost>0?`<div class="flex justify-between"><span class="text-gray-500">Travel (${d.location})</span><span>$${d.breakdown.travel_cost.toFixed(0)}</span></div>`:''}
        ${d.breakdown.floor_surcharge>0?`<div class="flex justify-between text-orange-600"><span>Floor</span><span>+$${d.breakdown.floor_surcharge}</span></div>`:''}
        ${d.breakdown.extra_tech_cost>0?`<div class="flex justify-between text-orange-600"><span>Extra tech</span><span>+$${d.breakdown.extra_tech_cost.toFixed(0)}</span></div>`:''}
        ${d.breakdown.urgency_label?`<div class="text-orange-500 text-xs">${d.breakdown.urgency_label}</div>`:''}
        <div class="border-t pt-1.5 flex justify-between font-semibold"><span>Subtotal</span><span>$${d.total_min.toFixed(0)} – $${d.total_max.toFixed(0)}</span></div>
        <div class="flex justify-between text-gray-400 text-xs"><span>Tax 10.25%</span><span>$${d.tax_min.toFixed(0)} – $${d.tax_max.toFixed(0)}</span></div>
      </div>
      ${notes?`<ul class="text-sm text-gray-600 space-y-1 mb-4">${notes}</ul>`:''}
      <div class="flex gap-2">
        <button onclick="window.print()" class="flex-1 border border-gray-300 text-gray-700 py-2.5 rounded-lg text-sm">🖨️ Print</button>
        <button onclick="copyResult()" class="flex-1 bg-blue-600 text-white py-2.5 rounded-lg text-sm font-medium">📋 Copy</button>
      </div>
    </div>`;
  window._lastResult = d;
  window._lastLabel = label;
}

async function loadSimilarJobs(category, area) {
  const el = document.getElementById('similarJobs');
  if (!category || !area || area < 0.5) { el.innerHTML=''; return; }
  try {
    const res = await fetch(`${API}/api/similar-jobs?category=${category}&area_sqft=${area}`);
    const jobs = await res.json();
    if (!jobs.length) { el.innerHTML=''; return; }
    let rows = jobs.map(j => {
      const feats = (j.features||[]).join(', ');
      return `<tr class="border-b border-gray-100 last:border-0">
        <td class="py-2 pr-3 text-sm text-gray-600 font-medium">#${j.invoice}</td>
        <td class="py-2 pr-3 text-sm text-gray-500">${j.area_sqft} sqft</td>
        <td class="py-2 pr-3 text-sm font-semibold text-blue-700">$${j.price.toLocaleString()}</td>
        <td class="py-2 pr-3 text-xs text-gray-400">${j.price_per_sqft}/sqft</td>
        <td class="py-2 text-xs text-gray-400">${j.zip_code||''} ${j.date||''}</td>
      </tr>
      <tr><td colspan="5" class="pb-2 text-xs text-gray-400">${j.description.substring(0,80)}${feats?' | '+feats:''}</td></tr>`;
    }).join('');
    el.innerHTML = `
      <div class="bg-amber-50 border border-amber-200 rounded-xl p-4">
        <h3 class="font-semibold text-amber-800 mb-2 text-sm">📋 Similar past jobs (${jobs.length} found)</h3>
        <table class="w-full">${rows}</table>
      </div>`;
  } catch(e) { el.innerHTML=''; }
}

function copyResult() {
  const d = window._lastResult;
  const text = `ESTIMATE — ${window._lastLabel}\nArea: ${d.total_area_sqft} sqft | ${d.location}\n\nMaterial: $${d.breakdown.material_min}–$${d.breakdown.material_max}\nLabor: $${d.breakdown.labor_min}–$${d.breakdown.labor_max}\n${d.breakdown.travel_cost>0?`Travel: $${d.breakdown.travel_cost}\n`:''}TOTAL: $${d.total_min}–$${d.total_max}\nTax: $${d.tax_min}–$${d.tax_max}\nGRAND TOTAL: $${d.grand_total_min}–$${d.grand_total_max}\n\nFast Glass & Windows — 213-566-8886`;
  navigator.clipboard.writeText(text).then(()=>alert('Copied!'));
}

init();
</script>
