<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glass Price Calculator — Fast Glass & Windows</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .fraction-btn { min-width: 48px; min-height: 44px; }
    .service-card { transition: all 0.15s; cursor: pointer; }
    .service-card:hover { transform: translateY(-1px); }
    .service-card.selected { border-color: #2563EB; background: #EFF6FF; }
    .result-box { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Header -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-10">
    <div class="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
      <div>
        <h1 class="text-lg font-bold text-gray-900">🪟 Glass Price Calculator</h1>
        <p class="text-xs text-gray-500">Fast Glass & Windows — Internal Tool</p>
      </div>
      <a href="/admin" class="text-xs text-gray-400 hover:text-blue-600">Admin ⚙️</a>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 py-6 space-y-6">

    <!-- STEP 1: Service Type -->
    <section class="bg-white rounded-xl border border-gray-200 p-4">
      <h2 class="font-semibold text-gray-800 mb-3">1. Glass Type</h2>
      <div id="serviceList" class="space-y-2">
        <div class="text-sm text-gray-400">Loading services...</div>
      </div>
    </section>

    <!-- STEP 2: Dimensions -->
    <section class="bg-white rounded-xl border border-gray-200 p-4">
      <h2 class="font-semibold text-gray-800 mb-4">2. Dimensions</h2>

      <!-- Width -->
      <div class="mb-4">
        <label class="text-sm font-medium text-gray-700 mb-2 block">Width</label>
        <div class="flex gap-2 items-center flex-wrap">
          <div class="flex items-center gap-1">
            <input type="number" id="widthFt" min="0" max="50" value="0"
              class="w-16 text-center border border-gray-300 rounded-lg px-2 py-2 text-base">
            <span class="text-sm text-gray-500">ft</span>
          </div>
          <div class="flex items-center gap-1">
            <input type="number" id="widthIn" min="0" max="11" value="24"
              class="w-16 text-center border border-gray-300 rounded-lg px-2 py-2 text-base">
            <span class="text-sm text-gray-500">in</span>
          </div>
          <div class="flex items-center gap-1">
            <select id="widthFrac" class="border border-gray-300 rounded-lg px-2 py-2 text-base">
              <option value="0">0</option>
              <option value="1/8">1/8"</option>
              <option value="1/4">1/4"</option>
              <option value="3/8">3/8"</option>
              <option value="1/2" selected>1/2"</option>
              <option value="5/8">5/8"</option>
              <option value="3/4">3/4"</option>
              <option value="7/8">7/8"</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Height -->
      <div class="mb-4">
        <label class="text-sm font-medium text-gray-700 mb-2 block">Height</label>
        <div class="flex gap-2 items-center flex-wrap">
          <div class="flex items-center gap-1">
            <input type="number" id="heightFt" min="0" max="50" value="0"
              class="w-16 text-center border border-gray-300 rounded-lg px-2 py-2 text-base">
            <span class="text-sm text-gray-500">ft</span>
          </div>
          <div class="flex items-center gap-1">
            <input type="number" id="heightIn" min="0" max="11" value="36"
              class="w-16 text-center border border-gray-300 rounded-lg px-2 py-2 text-base">
            <span class="text-sm text-gray-500">in</span>
          </div>
          <div class="flex items-center gap-1">
            <select id="heightFrac" class="border border-gray-300 rounded-lg px-2 py-2 text-base">
              <option value="0" selected>0</option>
              <option value="1/8">1/8"</option>
              <option value="1/4">1/4"</option>
              <option value="3/8">3/8"</option>
              <option value="1/2">1/2"</option>
              <option value="5/8">5/8"</option>
              <option value="3/4">3/4"</option>
              <option value="7/8">7/8"</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Quantity -->
      <div>
        <label class="text-sm font-medium text-gray-700 mb-2 block">Quantity (pieces)</label>
        <input type="number" id="quantity" min="1" max="100" value="1"
          class="w-24 text-center border border-gray-300 rounded-lg px-2 py-2 text-base">
      </div>
    </section>

    <!-- STEP 3: Location -->
    <section class="bg-white rounded-xl border border-gray-200 p-4">
      <h2 class="font-semibold text-gray-800 mb-3">3. Location</h2>
      <div class="flex gap-3 items-start">
        <div class="flex-1">
          <input type="text" id="zipCode" placeholder="ZIP Code (e.g. 90210)"
            maxlength="5" pattern="[0-9]{5}"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-base"
            oninput="lookupZip(this.value)">
          <div id="zipInfo" class="text-xs text-gray-500 mt-1"></div>
        </div>
      </div>
    </section>

    <!-- STEP 4: Job Details -->
    <section class="bg-white rounded-xl border border-gray-200 p-4">
      <h2 class="font-semibold text-gray-800 mb-4">4. Job Details</h2>

      <!-- Floor -->
      <div class="mb-4">
        <label class="text-sm font-medium text-gray-700 mb-2 block">Floor</label>
        <div class="flex gap-2 flex-wrap">
          <button onclick="setFloor(1, this)" class="floor-btn px-4 py-2 rounded-lg border-2 border-blue-600 bg-blue-600 text-white text-sm font-medium">1st Floor</button>
          <button onclick="setFloor(2, this)" class="floor-btn px-4 py-2 rounded-lg border-2 border-gray-300 text-gray-700 text-sm font-medium">2nd Floor +$150</button>
          <button onclick="setFloor(3, this)" class="floor-btn px-4 py-2 rounded-lg border-2 border-gray-300 text-gray-700 text-sm font-medium">3rd+ Floor +$300</button>
        </div>
      </div>

      <!-- Technicians -->
      <div class="mb-4">
        <label class="text-sm font-medium text-gray-700 mb-2 block">Technicians Needed</label>
        <div class="flex gap-2">
          <button onclick="setTechs(1, this)" class="tech-btn px-4 py-2 rounded-lg border-2 border-blue-600 bg-blue-600 text-white text-sm font-medium">1</button>
          <button onclick="setTechs(2, this)" class="tech-btn px-4 py-2 rounded-lg border-2 border-gray-300 text-gray-700 text-sm font-medium">2</button>
          <button onclick="setTechs(3, this)" class="tech-btn px-4 py-2 rounded-lg border-2 border-gray-300 text-gray-700 text-sm font-medium">3</button>
        </div>
      </div>

      <!-- Urgency -->
      <div class="mb-4">
        <label class="text-sm font-medium text-gray-700 mb-2 block">Urgency</label>
        <div class="flex gap-2 flex-wrap">
          <button onclick="setUrgency('normal', this)" class="urgency-btn px-3 py-2 rounded-lg border-2 border-blue-600 bg-blue-600 text-white text-sm font-medium">Normal</button>
          <button onclick="setUrgency('urgent', this)" class="urgency-btn px-3 py-2 rounded-lg border-2 border-gray-300 text-gray-700 text-sm font-medium">Same-Day +30%</button>
          <button onclick="setUrgency('emergency', this)" class="urgency-btn px-3 py-2 rounded-lg border-2 border-gray-300 text-gray-700 text-sm font-medium">Emergency +50%</button>
        </div>
      </div>
    </section>

    <!-- STEP 5: Extras -->
    <section class="bg-white rounded-xl border border-gray-200 p-4">
      <h2 class="font-semibold text-gray-800 mb-3">5. Additional Work</h2>
      <div id="modifierList" class="space-y-2">
        <div class="text-sm text-gray-400">Loading...</div>
      </div>
    </section>

    <!-- STEP 6: Notes -->
    <section class="bg-white rounded-xl border border-gray-200 p-4">
      <h2 class="font-semibold text-gray-800 mb-3">6. Notes / Complexity</h2>
      <textarea id="notes" rows="3" placeholder="e.g. Outside patio, need ladder, Beverly Hills estate, tight access..."
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-base resize-none"></textarea>
    </section>

    <!-- CALCULATE BUTTON -->
    <button onclick="calculatePrice()"
      class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold py-4 px-6 rounded-xl text-lg transition-colors shadow-md">
      💰 Calculate Price
    </button>

    <!-- RESULT -->
    <div id="result" class="hidden"></div>

    <div class="h-8"></div>
  </main>

<script>
  const API = '';
  let selectedService = null;
  let selectedFloor = 1;
  let selectedTechs = 1;
  let selectedUrgency = 'normal';
  let selectedModifiers = [];

  // Load services on page load
  async function loadServices() {
    try {
      const res = await fetch(`${API}/api/services`);
      const services = await res.json();

      // Group by category
      const grouped = {};
      services.forEach(s => {
        if (!grouped[s.category]) grouped[s.category] = [];
        grouped[s.category].push(s);
      });

      const container = document.getElementById('serviceList');
      container.innerHTML = '';

      // Show main categories first
      const mainCats = ['Residential', 'Commercial', 'Window Tint', 'Auto Glass', 'Specialty', 'Shower & Mirror'];
      mainCats.forEach(cat => {
        if (!grouped[cat]) return;

        const catDiv = document.createElement('div');
        catDiv.innerHTML = `<p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mt-3 mb-1">${cat}</p>`;

        const grid = document.createElement('div');
        grid.className = 'grid grid-cols-1 gap-1';

        grouped[cat].forEach(s => {
          const card = document.createElement('div');
          card.className = 'service-card border border-gray-200 rounded-lg px-3 py-2 flex items-center justify-between';
          card.dataset.id = s.id;
          card.innerHTML = `
            <div>
              <span class="text-sm font-medium text-gray-800">${s.name}</span>
              <span class="text-xs text-gray-400 ml-2">${s.unit}</span>
            </div>
            <span class="text-sm text-blue-600 font-semibold">$${s.price_min}–$${s.price_max}</span>
          `;
          card.onclick = () => selectService(s.id, card);
          grid.appendChild(card);
        });

        catDiv.appendChild(grid);
        container.appendChild(catDiv);
      });

      // Auto-select first service
      const first = container.querySelector('.service-card');
      if (first) first.click();

    } catch(e) {
      document.getElementById('serviceList').innerHTML = '<div class="text-red-500 text-sm">Error loading services. Is the server running?</div>';
    }
  }

  function selectService(id, card) {
    document.querySelectorAll('.service-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    selectedService = id;
  }

  // Load modifiers
  async function loadModifiers() {
    try {
      const res = await fetch(`${API}/api/modifiers`);
      const mods = await res.json();
      const container = document.getElementById('modifierList');
      container.innerHTML = '';

      mods.forEach(m => {
        const div = document.createElement('label');
        div.className = 'flex items-center gap-3 py-1 cursor-pointer';
        div.innerHTML = `
          <input type="checkbox" value="${m.id}" onchange="toggleModifier(${m.id}, this.checked)"
            class="w-5 h-5 rounded border-gray-300 text-blue-600">
          <div class="flex-1">
            <span class="text-sm font-medium text-gray-800">${m.name}</span>
            <span class="text-xs text-gray-500 ml-2">${m.description}</span>
          </div>
          <span class="text-sm text-gray-600">+$${m.price}${m.price_type === 'per_sqft' ? '/sqft' : m.price_type === 'per_unit' ? '/ea' : ''}</span>
        `;
        container.appendChild(div);
      });
    } catch(e) {}
  }

  function toggleModifier(id, checked) {
    if (checked) {
      if (!selectedModifiers.includes(id)) selectedModifiers.push(id);
    } else {
      selectedModifiers = selectedModifiers.filter(m => m !== id);
    }
  }

  // Floor buttons
  function setFloor(floor, btn) {
    selectedFloor = floor;
    document.querySelectorAll('.floor-btn').forEach(b => {
      b.className = 'floor-btn px-4 py-2 rounded-lg border-2 border-gray-300 text-gray-700 text-sm font-medium';
    });
    btn.className = 'floor-btn px-4 py-2 rounded-lg border-2 border-blue-600 bg-blue-600 text-white text-sm font-medium';
  }

  function setTechs(n, btn) {
    selectedTechs = n;
    document.querySelectorAll('.tech-btn').forEach(b => {
      b.className = 'tech-btn px-4 py-2 rounded-lg border-2 border-gray-300 text-gray-700 text-sm font-medium';
    });
    btn.className = 'tech-btn px-4 py-2 rounded-lg border-2 border-blue-600 bg-blue-600 text-white text-sm font-medium';
  }

  function setUrgency(u, btn) {
    selectedUrgency = u;
    document.querySelectorAll('.urgency-btn').forEach(b => {
      b.className = 'urgency-btn px-3 py-2 rounded-lg border-2 border-gray-300 text-gray-700 text-sm font-medium';
    });
    btn.className = 'urgency-btn px-3 py-2 rounded-lg border-2 border-blue-600 bg-blue-600 text-white text-sm font-medium';
  }

  // ZIP lookup
  let zipTimer;
  async function lookupZip(zip) {
    clearTimeout(zipTimer);
    if (zip.length !== 5) {
      document.getElementById('zipInfo').textContent = '';
      return;
    }
    zipTimer = setTimeout(async () => {
      try {
        const res = await fetch(`${API}/api/zip/${zip}`);
        const data = await res.json();
        const mult = data.multiplier > 1 ? ` • ${Math.round((data.multiplier-1)*100)}% area markup` : '';
        document.getElementById('zipInfo').textContent =
          `📍 ${data.city} • ${data.travel_minutes} min drive${mult}`;
      } catch(e) {}
    }, 500);
  }

  // MAIN CALCULATE
  async function calculatePrice() {
    if (!selectedService) {
      alert('Please select a glass type first');
      return;
    }

    const btn = document.querySelector('button[onclick="calculatePrice()"]');
    btn.textContent = '⏳ Calculating...';
    btn.disabled = true;

    const body = {
      service_id: selectedService,
      width_ft: parseInt(document.getElementById('widthFt').value) || 0,
      width_in: parseInt(document.getElementById('widthIn').value) || 0,
      width_frac: document.getElementById('widthFrac').value,
      height_ft: parseInt(document.getElementById('heightFt').value) || 0,
      height_in: parseInt(document.getElementById('heightIn').value) || 0,
      height_frac: document.getElementById('heightFrac').value,
      quantity: parseInt(document.getElementById('quantity').value) || 1,
      zip_code: document.getElementById('zipCode').value || '91324',
      floor: selectedFloor,
      num_technicians: selectedTechs,
      urgency: selectedUrgency,
      modifier_ids: selectedModifiers,
      notes: document.getElementById('notes').value,
    };

    try {
      const res = await fetch(`${API}/api/calculate`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || 'Calculation failed');
      }

      const data = await res.json();
      showResult(data);
    } catch(e) {
      document.getElementById('result').innerHTML = `
        <div class="bg-red-50 border border-red-200 rounded-xl p-4 text-red-700">
          ❌ Error: ${e.message}
        </div>`;
      document.getElementById('result').classList.remove('hidden');
    }

    btn.textContent = '💰 Calculate Price';
    btn.disabled = false;
    document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
  }

  function showResult(d) {
    const notes = d.notes.filter(n => n).map(n => `<li class="text-sm">${n}</li>`).join('');

    const html = `
      <div class="result-box bg-white rounded-xl border-2 border-blue-600 p-5 shadow-md">
        <div class="flex items-start justify-between mb-4">
          <div>
            <h3 class="font-bold text-gray-900 text-lg">${d.service_name}</h3>
            <p class="text-sm text-gray-500">${d.total_area_sqft} sq ft • ${d.location || 'Local'}</p>
          </div>
          <div class="text-right">
            <div class="text-2xl font-bold text-blue-600">$${d.grand_total_min.toLocaleString()} – $${d.grand_total_max.toLocaleString()}</div>
            <div class="text-xs text-gray-400">incl. tax (10.25%)</div>
          </div>
        </div>

        <!-- Breakdown -->
        <div class="bg-gray-50 rounded-lg p-3 mb-4 space-y-1 text-sm">
          <div class="flex justify-between"><span class="text-gray-600">Material:</span><span class="font-medium">$${d.breakdown.material_min} – $${d.breakdown.material_max}</span></div>
          <div class="flex justify-between"><span class="text-gray-600">Labor:</span><span class="font-medium">$${d.breakdown.labor_min} – $${d.breakdown.labor_max}</span></div>
          ${d.breakdown.travel_cost > 0 ? `<div class="flex justify-between"><span class="text-gray-600">Travel:</span><span class="font-medium">$${d.breakdown.travel_cost}</span></div>` : ''}
          ${d.breakdown.floor_surcharge > 0 ? `<div class="flex justify-between"><span class="text-gray-600">Floor surcharge:</span><span class="font-medium">$${d.breakdown.floor_surcharge}</span></div>` : ''}
          ${d.breakdown.extra_tech_cost > 0 ? `<div class="flex justify-between"><span class="text-gray-600">Extra tech:</span><span class="font-medium">$${d.breakdown.extra_tech_cost}</span></div>` : ''}
          ${d.breakdown.modifiers_total > 0 ? `<div class="flex justify-between"><span class="text-gray-600">Add-ons:</span><span class="font-medium">$${d.breakdown.modifiers_total.toFixed(2)}</span></div>` : ''}
          ${d.breakdown.urgency_label ? `<div class="flex justify-between text-orange-600"><span>${d.breakdown.urgency_label}</span></div>` : ''}
          <div class="border-t border-gray-200 pt-1 flex justify-between font-bold"><span>Before tax:</span><span>$${d.total_min} – $${d.total_max}</span></div>
          <div class="flex justify-between text-gray-500"><span>Tax (10.25%):</span><span>$${d.tax_min} – $${d.tax_max}</span></div>
        </div>

        ${notes ? `<ul class="space-y-1 mb-4 text-gray-600">${notes}</ul>` : ''}

        <div class="flex gap-2">
          <button onclick="window.print()" class="flex-1 border border-gray-300 text-gray-700 py-2 rounded-lg text-sm font-medium hover:bg-gray-50">🖨️ Print</button>
          <button onclick="copyEstimate(${JSON.stringify(d).replace(/"/g,'&quot;')})" class="flex-1 border border-blue-600 text-blue-600 py-2 rounded-lg text-sm font-medium hover:bg-blue-50">📋 Copy Text</button>
        </div>
      </div>
    `;

    const resultEl = document.getElementById('result');
    resultEl.innerHTML = html;
    resultEl.classList.remove('hidden');
  }

  function copyEstimate(d) {
    const text = `ESTIMATE — ${d.service_name}
Area: ${d.total_area_sqft} sqft
Location: ${d.location}

Material: $${d.breakdown.material_min} – $${d.breakdown.material_max}
Labor: $${d.breakdown.labor_min} – $${d.breakdown.labor_max}
${d.breakdown.travel_cost > 0 ? `Travel: $${d.breakdown.travel_cost}\n` : ''}TOTAL (before tax): $${d.total_min} – $${d.total_max}
Tax: $${d.tax_min} – $${d.tax_max}
GRAND TOTAL: $${d.grand_total_min} – $${d.grand_total_max}

Fast Glass & Windows — 213-566-8886`;

    navigator.clipboard.writeText(text).then(() => {
      alert('Copied to clipboard!');
    });
  }

  // Init
  loadServices();
  loadModifiers();
</script>
</body>
</html>
