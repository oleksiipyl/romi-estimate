<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Glass Estimate — Fast Glass & Windows</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#2563EB',
            'brand-light': '#EFF6FF',
            'brand-border': '#BFDBFE',
          }
        }
      }
    }
  </script>
  <style>
    /* Mobile-first base */
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #F9FAFB; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

    /* Pill scrollable row — hide scrollbar */
    .pills-row { display: flex; flex-direction: row; gap: 8px; overflow-x: auto; padding-bottom: 4px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .pills-row::-webkit-scrollbar { display: none; }

    /* Pill button */
    .pill {
      display: inline-flex; align-items: center; justify-content: center;
      height: 36px; padding: 0 14px; border-radius: 999px; cursor: pointer;
      font-size: 14px; font-weight: 500; white-space: nowrap; border: 1.5px solid transparent;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      background: #F3F4F6; color: #374151; user-select: none;
    }
    .pill.selected { background: #2563EB; color: white; border-color: #2563EB; }
    .pill:hover:not(.selected) { background: #E5E7EB; }

    /* Smaller pill for options */
    .pill-sm { height: 34px; padding: 0 12px; font-size: 13px; }

    /* Product card */
    .product-card {
      position: relative; height: 72px; border: 1.5px solid #E5E7EB;
      border-radius: 12px; background: white; cursor: pointer;
      display: flex; align-items: center; padding: 0 12px;
      transition: border-color 0.15s, background 0.15s;
      overflow: hidden;
    }
    .product-card.selected { border-color: #2563EB; background: #EFF6FF; }
    .product-card:hover:not(.selected) { border-color: #93C5FD; }
    .product-card .radio-dot {
      position: absolute; top: 8px; right: 8px;
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid #D1D5DB; background: white;
      transition: border-color 0.15s, background 0.15s;
    }
    .product-card.selected .radio-dot { border-color: #2563EB; background: #2563EB; }
    .product-card.selected .radio-dot::after {
      content: ''; display: block; width: 6px; height: 6px;
      border-radius: 50%; background: white;
      margin: 3px auto;
    }

    /* Dimension inputs */
    .dim-input {
      width: 52px; text-align: center; border: 1.5px solid #D1D5DB;
      border-radius: 8px; padding: 6px 4px; font-size: 14px;
      background: white; outline: none; transition: border-color 0.15s;
    }
    .dim-input:focus { border-color: #2563EB; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }

    /* Select dropdown */
    .dim-select {
      border: 1.5px solid #D1D5DB; border-radius: 8px;
      padding: 6px 8px; font-size: 13px; background: white;
      outline: none; cursor: pointer; transition: border-color 0.15s;
    }
    .dim-select:focus { border-color: #2563EB; }
    .full-select {
      width: 100%; height: 44px; border: 1.5px solid #D1D5DB;
      border-radius: 8px; padding: 0 12px; font-size: 14px;
      background: white; outline: none; cursor: pointer;
      transition: border-color 0.15s;
    }
    .full-select:focus { border-color: #2563EB; }

    /* Floor/tech/urgency buttons */
    .seg-btn {
      flex: 1; height: 44px; border: 1.5px solid #E5E7EB;
      background: white; border-radius: 8px; cursor: pointer;
      font-size: 13px; color: #374151; font-weight: 500;
      transition: all 0.15s; text-align: center; display: flex;
      align-items: center; justify-content: center;
    }
    .seg-btn.selected { border-color: #2563EB; background: #EFF6FF; color: #2563EB; }
    .seg-btn:hover:not(.selected) { border-color: #93C5FD; background: #F8FAFF; }

    /* Square tech btn */
    .sq-btn {
      width: 44px; height: 44px; border: 1.5px solid #E5E7EB;
      background: white; border-radius: 8px; cursor: pointer;
      font-size: 15px; font-weight: 600; color: #374151;
      transition: all 0.15s; display: flex; align-items: center; justify-content: center;
    }
    .sq-btn.selected { border-color: #2563EB; background: #EFF6FF; color: #2563EB; }
    .sq-btn:hover:not(.selected) { border-color: #93C5FD; }

    /* Urgency stacked */
    .urgency-btn {
      width: 100%; height: 44px; border: 1.5px solid #E5E7EB;
      background: white; border-radius: 8px; cursor: pointer;
      font-size: 13px; font-weight: 500; color: #374151;
      transition: all 0.15s; text-align: center; display: flex;
      align-items: center; justify-content: center;
    }
    .urgency-btn.selected { border-color: #2563EB; background: #EFF6FF; color: #2563EB; }
    .urgency-btn:hover:not(.selected) { border-color: #93C5FD; background: #F8FAFF; }

    /* Section card */
    .section-card {
      background: white; border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.04);
      padding: 16px; margin-bottom: 12px;
    }
    .section-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: #6B7280; margin-bottom: 12px;
    }

    /* Area preview */
    .area-preview {
      background: #F0F9FF; border: 1.5px solid #BAE6FD;
      height: 44px; border-radius: 8px; padding: 0 12px;
      display: flex; align-items: center; font-size: 13px;
      color: #0369A1; font-weight: 500;
    }

    /* Result section */
    .result-section {
      background: white; border-radius: 16px;
      box-shadow: 0 2px 8px rgba(37,99,235,0.12), 0 0 0 1px rgba(37,99,235,0.08);
      padding: 20px; margin-bottom: 12px;
    }

    /* Breakdown row */
    .breakdown-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; border-bottom: 1px solid #E5E7EB; }
    .breakdown-row:last-child { border-bottom: none; font-weight: 700; font-size: 14px; }

    /* Spinner */
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid #E5E7EB; border-top-color: #2563EB;
      border-radius: 50%; animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Fade-in */
    .fade-in { animation: fadeIn 0.25s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    /* ZIP badge */
    .zip-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: #ECFDF5; border: 1px solid #6EE7B7;
      border-radius: 999px; padding: 2px 10px;
      font-size: 12px; color: #065F46; font-weight: 500;
    }

    /* Scrollbar for textarea */
    textarea { resize: none; }

    /* Header */
    .app-header { min-width: 0; }
    .app-header-title { min-width: 0; }
    .app-status { flex-shrink: 0; max-width: 72px; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Category pills — 2×2 grid on narrow screens */
    .category-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .category-grid .pill {
      width: 100%;
      height: 40px;
      font-size: 13px;
      padding: 0 10px;
    }

    /* Mobile 375px optimizations */
    @media (max-width: 400px) {
      .section-card { padding: 12px; margin-bottom: 8px; border-radius: 12px; }
      .section-label { margin-bottom: 8px; font-size: 10px; }
      .dim-input { width: 44px; padding: 6px 2px; font-size: 13px; }
      .dim-select { font-size: 12px; padding: 6px 4px; }
      .product-card { height: 64px; padding: 0 10px; }
      .product-card .flex-1 { font-size: 12px; }
      .area-preview {
        height: auto; min-height: 40px;
        padding: 8px 10px; font-size: 12px;
        line-height: 1.35; word-break: break-word;
      }
      #result-price { font-size: 1.5rem !important; }
      .zip-badge { font-size: 11px; max-width: 100%; }
      .zip-row { flex-wrap: wrap; }
      .seg-btn { font-size: 12px; min-height: 44px; }
      .urgency-btn { font-size: 12px; min-height: 44px; }
      main { padding-left: 12px !important; padding-right: 12px !important; }
      header .max-w-lg { padding-left: 12px !important; padding-right: 12px !important; }
    }
  </style>
</head>
<body>

<!-- STICKY HEADER -->
<header class="sticky top-0 z-50 bg-white border-b border-gray-100 shadow-sm">
  <div class="max-w-lg mx-auto px-4 py-2.5 flex items-center justify-between gap-2">
    <div class="app-header flex items-center gap-2 min-w-0">
      <span class="text-lg flex-shrink-0">🪟</span>
      <div class="app-header-title min-w-0">
        <div class="font-bold text-gray-900 text-sm leading-tight truncate">Glass Estimate</div>
        <div class="text-[11px] text-gray-500 leading-tight truncate">Fast Glass &amp; Windows</div>
      </div>
    </div>
    <div id="calc-status" class="app-status text-[10px] text-gray-400">Ready</div>
  </div>
</header>

<!-- MAIN CONTENT -->
<main class="max-w-lg mx-auto px-4 py-4 pb-12">

  <!-- STEP 1: CATEGORY -->
  <div class="section-card">
    <div class="section-label">What needs to be done?</div>
    <div class="category-grid" id="category-pills">
      <button class="pill selected" data-cat="residential">🏠 Residential</button>
      <button class="pill" data-cat="commercial">🏢 Commercial</button>
      <button class="pill" data-cat="shower">🚿 Shower</button>
      <button class="pill" data-cat="specialty">✨ Specialty</button>
    </div>
  </div>

  <!-- STEP 2: PRODUCT -->
  <div class="section-card">
    <div class="section-label">Select Type</div>
    <div id="product-grid" class="grid grid-cols-2 gap-[10px]">
      <!-- Populated by JS -->
    </div>
    <div id="product-loading" class="flex justify-center py-4">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- STEP 3: OPTIONS (hidden until product selected) -->
  <div class="section-card fade-in" id="options-section" style="display:none">
    <div class="section-label">Options</div>
    <div id="options-fields">
      <!-- Populated by JS -->
    </div>
  </div>

  <!-- STEP 4: DIMENSIONS -->
  <div class="section-card">
    <div class="section-label">Dimensions</div>
    <div class="grid grid-cols-2 gap-2 sm:gap-4">
      <!-- WIDTH -->
      <div>
        <div class="text-[11px] font-semibold uppercase tracking-wide text-gray-500 mb-2">Width</div>
        <div class="flex items-center gap-1 mb-2">
          <input class="dim-input" type="number" id="width-ft" placeholder="ft" min="0" max="99" value="2" />
          <span class="text-gray-400 text-sm">ft</span>
          <input class="dim-input" type="number" id="width-in" placeholder="in" min="0" max="11" value="0" />
          <span class="text-gray-400 text-sm">in</span>
        </div>
        <select class="dim-select w-full" id="width-frac">
          <option value="0">+ 0″</option>
          <option value="1/8">+ 1/8″</option>
          <option value="1/4">+ 1/4″</option>
          <option value="3/8">+ 3/8″</option>
          <option value="1/2">+ 1/2″</option>
          <option value="5/8">+ 5/8″</option>
          <option value="3/4">+ 3/4″</option>
          <option value="7/8">+ 7/8″</option>
        </select>
      </div>
      <!-- HEIGHT -->
      <div>
        <div class="text-[11px] font-semibold uppercase tracking-wide text-gray-500 mb-2">Height</div>
        <div class="flex items-center gap-1 mb-2">
          <input class="dim-input" type="number" id="height-ft" placeholder="ft" min="0" max="99" value="3" />
          <span class="text-gray-400 text-sm">ft</span>
          <input class="dim-input" type="number" id="height-in" placeholder="in" min="0" max="11" value="0" />
          <span class="text-gray-400 text-sm">in</span>
        </div>
        <select class="dim-select w-full" id="height-frac">
          <option value="0">+ 0″</option>
          <option value="1/8">+ 1/8″</option>
          <option value="1/4">+ 1/4″</option>
          <option value="3/8">+ 3/8″</option>
          <option value="1/2">+ 1/2″</option>
          <option value="5/8">+ 5/8″</option>
          <option value="3/4">+ 3/4″</option>
          <option value="7/8">+ 7/8″</option>
        </select>
      </div>
    </div>

    <!-- LIVE AREA PREVIEW -->
    <div class="area-preview mt-4" id="area-preview">
      📐 Area: — sq ft
    </div>

    <!-- QUANTITY -->
    <div class="flex items-center gap-3 mt-3">
      <span class="text-sm text-gray-600 font-medium">Qty:</span>
      <div class="flex items-center gap-2">
        <button class="w-8 h-8 rounded-lg border border-gray-200 bg-white text-gray-600 font-bold flex items-center justify-center hover:bg-gray-50 transition" id="qty-minus">−</button>
        <span class="text-sm font-semibold text-gray-800 w-6 text-center" id="qty-display">1</span>
        <button class="w-8 h-8 rounded-lg border border-gray-200 bg-white text-gray-600 font-bold flex items-center justify-center hover:bg-gray-50 transition" id="qty-plus">+</button>
      </div>
    </div>
  </div>

  <!-- STEP 5: LOCATION & JOB -->
  <div class="section-card">
    <div class="section-label">Location &amp; Job Details</div>

    <!-- ZIP -->
    <div class="mb-4">
      <div class="text-[11px] font-semibold uppercase tracking-wide text-gray-500 mb-2">ZIP Code</div>
      <div class="flex items-center gap-2 zip-row">
        <input
          type="text" id="zip-input" maxlength="5"
          placeholder="90210"
          class="dim-select text-base font-mono w-24 flex-shrink-0"
          style="height:44px; font-size:15px; letter-spacing:0.05em;"
          inputmode="numeric"
        />
        <div id="zip-badge" class="zip-badge" style="display:none"></div>
        <div id="zip-loading" style="display:none"><div class="spinner" style="width:14px;height:14px;"></div></div>
      </div>
    </div>

    <!-- FLOOR -->
    <div class="mb-4">
      <div class="text-[11px] font-semibold uppercase tracking-wide text-gray-500 mb-2">Floor</div>
      <div class="flex gap-2" id="floor-btns">
        <button class="seg-btn selected" data-floor="1">1st</button>
        <button class="seg-btn" data-floor="2">2nd<br/><span class="text-[10px] font-normal">+$150</span></button>
        <button class="seg-btn" data-floor="3">3rd+<br/><span class="text-[10px] font-normal">+$300</span></button>
      </div>
    </div>

    <!-- TECHNICIANS -->
    <div class="mb-4">
      <div class="text-[11px] font-semibold uppercase tracking-wide text-gray-500 mb-2">Technicians</div>
      <div class="flex gap-2" id="tech-btns">
        <button class="sq-btn selected" data-tech="1">1</button>
        <button class="sq-btn" data-tech="2">2</button>
        <button class="sq-btn" data-tech="3">3</button>
      </div>
    </div>

    <!-- URGENCY -->
    <div class="mb-4">
      <div class="text-[11px] font-semibold uppercase tracking-wide text-gray-500 mb-2">Urgency</div>
      <div class="flex flex-col gap-2" id="urgency-btns">
        <button class="urgency-btn selected" data-urgency="normal">Standard (3–5 days)</button>
        <button class="urgency-btn" data-urgency="urgent">Same-Day &nbsp;<span class="text-[11px] font-normal text-gray-400">+30%</span></button>
        <button class="urgency-btn" data-urgency="emergency">Emergency &nbsp;<span class="text-[11px] font-normal text-gray-400">+50%</span></button>
      </div>
    </div>

    <!-- NOTES -->
    <div>
      <div class="text-[11px] font-semibold uppercase tracking-wide text-gray-500 mb-2">Notes</div>
      <textarea
        id="notes-input" rows="2"
        placeholder="Any special instructions, access details, etc."
        class="w-full border border-gray-200 rounded-xl p-3 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-100 transition"
      ></textarea>
    </div>
  </div>

  <!-- RESULT SECTION (hidden until calc) -->
  <div id="result-section" class="result-section fade-in" style="display:none">
    <div class="flex items-start justify-between mb-1">
      <div>
        <div id="result-price" class="text-[32px] font-bold text-blue-600 leading-tight"></div>
        <div id="result-tax-note" class="text-xs text-gray-400 mt-0.5">includes LA tax 10.25%</div>
      </div>
      <div id="result-spinner" style="display:none"><div class="spinner"></div></div>
    </div>

    <!-- BREAKDOWN TABLE -->
    <div class="bg-gray-50 rounded-xl p-3 mt-4" id="breakdown-table">
      <!-- Populated by JS -->
    </div>

    <!-- ACTIONS -->
    <div class="flex gap-3 mt-4">
      <button id="copy-btn" class="flex-1 h-11 bg-blue-600 text-white rounded-xl font-semibold text-sm hover:bg-blue-700 active:bg-blue-800 transition flex items-center justify-center gap-2">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy
      </button>
      <button id="print-btn" class="flex-1 h-11 border-2 border-blue-600 text-blue-600 rounded-xl font-semibold text-sm hover:bg-blue-50 active:bg-blue-100 transition flex items-center justify-center gap-2">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Print
      </button>
    </div>
  </div>

  <!-- SIMILAR JOBS (hidden until calc) -->
  <div id="similar-section" class="fade-in rounded-xl p-3 mb-4 border border-amber-300" style="display:none; background:#FFFBEB; border-color:#FCD34D;">
    <div class="font-semibold text-sm text-amber-800 mb-2">📋 Similar past jobs</div>
    <div id="similar-table" class="text-xs text-amber-900">
      <!-- Populated by JS -->
    </div>
  </div>

</main>

<script>
// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const SVC = {
  residential_single: 1, residential_igu: 2, residential_foggy: 13,
  commercial_storefront: 17, commercial_partition: 19, commercial_door: 23,
  shower_door: 49, shower_mirror: 50,
  specialty_tabletop: 50, specialty_custom: 3, specialty_laminated: 6
};
const HCP = {
  residential_single: 'single_pane', residential_igu: 'double_pane_igu',
  residential_foggy: 'double_pane_igu', commercial_storefront: 'commercial_storefront',
  shower_door: 'shower_door', shower_mirror: 'mirror',
  specialty_tabletop: 'custom_tempered', specialty_laminated: 'laminated'
};
const FRAC = { '0': 0, '1/8': .125, '1/4': .25, '3/8': .375, '1/2': .5, '5/8': .625, '3/4': .75, '7/8': .875 };

const CAT_MAP = {
  residential: ['residential_single', 'residential_igu', 'residential_foggy'],
  commercial: ['commercial_storefront', 'commercial_partition', 'commercial_door'],
  shower: ['shower_door', 'shower_mirror'],
  specialty: ['specialty_tabletop', 'specialty_custom', 'specialty_laminated']
};

const PRODUCT_LABELS = {
  residential_single: { label: 'Single Pane', desc: 'Standard single pane window' },
  residential_igu: { label: 'Double Pane IGU', desc: 'Insulated glass unit' },
  residential_foggy: { label: 'Foggy / Seal Failure', desc: 'IGU fog replacement' },
  commercial_storefront: { label: 'Storefront Glass', desc: 'Commercial facade glass' },
  commercial_partition: { label: 'Glass Partition', desc: 'Office partition' },
  commercial_door: { label: 'Glass Door', desc: 'Entry or interior door' },
  shower_door: { label: 'Shower Door', desc: 'Frameless / framed door' },
  shower_mirror: { label: 'Mirror', desc: 'Bathroom or vanity mirror' },
  specialty_tabletop: { label: 'Table Top', desc: 'Custom tempered tabletop' },
  specialty_custom: { label: 'Custom Cut', desc: 'Any custom shape' },
  specialty_laminated: { label: 'Laminated Glass', desc: 'Safety / hurricane' }
};

// ─── STATE ───────────────────────────────────────────────────────────────────
const state = {
  category: 'residential',
  productKey: null,
  serviceId: null,
  optionFields: [],
  selectedModifiers: [],
  widthFt: 2, widthIn: 0, widthFrac: '0',
  heightFt: 3, heightIn: 0, heightFrac: '0',
  quantity: 1,
  zipCode: '',
  zipData: null,
  floor: 1,
  numTechs: 1,
  urgency: 'normal',
  notes: '',
  calcResult: null,
  calcTimer: null,
  zipTimer: null
};

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function fmt(n) { return n != null ? '$' + Math.round(n).toLocaleString() : '—'; }
function fmtRange(min, max) {
  if (min == null || max == null) return '—';
  return '$' + Math.round(min).toLocaleString() + ' – $' + Math.round(max).toLocaleString();
}
function calcAreaSqft() {
  const wIn = (state.widthFt * 12) + state.widthIn + (FRAC[state.widthFrac] || 0);
  const hIn = (state.heightFt * 12) + state.heightIn + (FRAC[state.heightFrac] || 0);
  return (wIn / 12) * (hIn / 12);
}
function dimLabel() {
  const wIn = (state.widthFt * 12) + state.widthIn + (FRAC[state.widthFrac] || 0);
  const hIn = (state.heightFt * 12) + state.heightIn + (FRAC[state.heightFrac] || 0);
  return Math.round(wIn) + '″ × ' + Math.round(hIn) + '″';
}

// ─── AREA PREVIEW ────────────────────────────────────────────────────────────
function updateAreaPreview() {
  const area = calcAreaSqft();
  const el = document.getElementById('area-preview');
  if (area > 0) {
    el.textContent = '📐 Area: ' + area.toFixed(2) + ' sq ft — ' + dimLabel();
  } else {
    el.textContent = '📐 Area: — sq ft';
  }
}

// ─── STATUS ──────────────────────────────────────────────────────────────────
function setStatus(txt) {
  document.getElementById('calc-status').textContent = txt;
}

// ─── STEP 1: CATEGORY PILLS ──────────────────────────────────────────────────
document.getElementById('category-pills').addEventListener('click', e => {
  const btn = e.target.closest('[data-cat]');
  if (!btn) return;
  const cat = btn.dataset.cat;
  if (cat === state.category) return;
  state.category = cat;
  state.productKey = null;
  state.serviceId = null;
  state.optionFields = [];
  state.selectedModifiers = [];
  document.querySelectorAll('#category-pills .pill').forEach(p => p.classList.toggle('selected', p.dataset.cat === cat));
  renderProducts();
  hideOptions();
  scheduleCalc();
});

// ─── STEP 2: PRODUCTS ────────────────────────────────────────────────────────
function renderProducts() {
  const grid = document.getElementById('product-grid');
  const loading = document.getElementById('product-loading');
  const keys = CAT_MAP[state.category] || [];
  grid.innerHTML = '';
  loading.style.display = 'none';

  // Try to fetch from API first, fall back to local map
  fetchProducts(state.category, keys).then(products => {
    grid.innerHTML = '';
    products.forEach(p => {
      const card = document.createElement('div');
      card.className = 'product-card' + (p.key === state.productKey ? ' selected' : '');
      card.dataset.key = p.key;
      card.innerHTML = `
        <div class="flex-1 min-w-0">
          <div class="text-[13px] font-semibold text-gray-900 leading-tight mb-0.5">${p.label}</div>
          <div class="text-[11px] text-gray-400 leading-tight truncate">${p.desc}</div>
        </div>
        <div class="radio-dot"></div>
      `;
      card.addEventListener('click', () => selectProduct(p.key, p.id));
      grid.appendChild(card);
    });
  });
}

async function fetchProducts(category, keys) {
  try {
    const resp = await fetch('/api/products');
    if (!resp.ok) throw new Error('not ok');
    const data = await resp.json();
    // Find matching category
    const catData = data.find(c => c.category_id === category);
    if (catData && catData.products) {
      return catData.products.map(p => ({
        key: p.id,
        id: SVC[p.id] || 1,
        label: p.label,
        desc: p.description || ''
      }));
    }
  } catch(_) {}
  // Fallback to local map
  return keys.map(k => ({
    key: k, id: SVC[k],
    label: PRODUCT_LABELS[k]?.label || k,
    desc: PRODUCT_LABELS[k]?.desc || ''
  }));
}

function selectProduct(key, id) {
  state.productKey = key;
  state.serviceId = id || SVC[key];
  state.selectedModifiers = [];
  document.querySelectorAll('#product-grid .product-card').forEach(c => {
    c.classList.toggle('selected', c.dataset.key === key);
  });
  loadOptions(key);
  scheduleCalc();
}

// ─── STEP 3: OPTIONS ─────────────────────────────────────────────────────────
function hideOptions() {
  document.getElementById('options-section').style.display = 'none';
}

async function loadOptions(productKey) {
  const section = document.getElementById('options-section');
  const fields = document.getElementById('options-fields');
  fields.innerHTML = '<div class="flex justify-center py-3"><div class="spinner"></div></div>';
  section.style.display = 'block';

  try {
    const resp = await fetch(`/api/products/${productKey}`);
    if (!resp.ok) throw new Error('not ok');
    const data = await resp.json();
    if (data.fields && data.fields.length > 0) {
      state.optionFields = data.fields;
      renderOptionFields(data.fields);
    } else {
      section.style.display = 'none';
      state.optionFields = [];
    }
  } catch(_) {
    section.style.display = 'none';
    state.optionFields = [];
  }
}

function renderOptionFields(fields) {
  const container = document.getElementById('options-fields');
  container.innerHTML = '';
  fields.forEach(field => {
    const wrap = document.createElement('div');
    wrap.className = 'mb-4';
    const labelEl = document.createElement('div');
    labelEl.className = 'text-[12px] font-bold text-gray-700 mb-2';
    labelEl.textContent = field.label;
    wrap.appendChild(labelEl);

    if (!field.options || field.options.length === 0) return;

    if (field.options.length <= 5) {
      // Pill row
      const row = document.createElement('div');
      row.className = 'pills-row';
      field.options.forEach(opt => {
        const isDefault = opt.value === field.default;
        const btn = document.createElement('button');
        btn.className = 'pill pill-sm' + (isDefault ? ' selected' : '');
        btn.dataset.fieldId = field.id;
        btn.dataset.value = opt.value;
        let label = opt.label;
        if (opt.price_add_sqft) label += ` <span class="text-[10px] font-normal opacity-70">+$${opt.price_add_sqft}/sqft</span>`;
        else if (opt.price_add) label += ` <span class="text-[10px] font-normal opacity-70">+$${opt.price_add}</span>`;
        btn.innerHTML = label;
        if (isDefault && opt.value) {
          addModifier(opt.value);
        }
        btn.addEventListener('click', () => {
          row.querySelectorAll('.pill').forEach(p => p.classList.remove('selected'));
          btn.classList.add('selected');
          // Remove other options from same field
          if (field.options) {
            field.options.forEach(o => removeModifier(o.value));
          }
          addModifier(opt.value);
          scheduleCalc();
        });
        row.appendChild(btn);
      });
      wrap.appendChild(row);
    } else {
      // Dropdown
      const sel = document.createElement('select');
      sel.className = 'full-select';
      sel.dataset.fieldId = field.id;
      field.options.forEach(opt => {
        const o = document.createElement('option');
        o.value = opt.value;
        let label = opt.label;
        if (opt.price_add_sqft) label += ` (+$${opt.price_add_sqft}/sqft)`;
        else if (opt.price_add) label += ` (+$${opt.price_add})`;
        o.textContent = label;
        if (opt.value === field.default) o.selected = true;
        sel.appendChild(o);
      });
      if (field.default) addModifier(field.default);
      sel.addEventListener('change', () => {
        if (field.options) field.options.forEach(o => removeModifier(o.value));
        addModifier(sel.value);
        scheduleCalc();
      });
      wrap.appendChild(sel);
    }
    container.appendChild(wrap);
  });
}

function addModifier(val) {
  if (val && !state.selectedModifiers.includes(val)) {
    state.selectedModifiers.push(val);
  }
}
function removeModifier(val) {
  state.selectedModifiers = state.selectedModifiers.filter(v => v !== val);
}

// ─── STEP 4: DIMENSIONS ──────────────────────────────────────────────────────
function bindDimensions() {
  ['width-ft', 'width-in', 'height-ft', 'height-in'].forEach(id => {
    document.getElementById(id).addEventListener('input', e => {
      const val = parseInt(e.target.value) || 0;
      const key = id.replace('-', '_').replace(/-/g, '_');
      if (id === 'width-ft') state.widthFt = val;
      else if (id === 'width-in') state.widthIn = Math.min(val, 11);
      else if (id === 'height-ft') state.heightFt = val;
      else if (id === 'height-in') state.heightIn = Math.min(val, 11);
      updateAreaPreview();
      scheduleCalc();
    });
  });
  document.getElementById('width-frac').addEventListener('change', e => {
    state.widthFrac = e.target.value;
    updateAreaPreview();
    scheduleCalc();
  });
  document.getElementById('height-frac').addEventListener('change', e => {
    state.heightFrac = e.target.value;
    updateAreaPreview();
    scheduleCalc();
  });
  // Qty
  document.getElementById('qty-minus').addEventListener('click', () => {
    if (state.quantity > 1) { state.quantity--; document.getElementById('qty-display').textContent = state.quantity; scheduleCalc(); }
  });
  document.getElementById('qty-plus').addEventListener('click', () => {
    if (state.quantity < 99) { state.quantity++; document.getElementById('qty-display').textContent = state.quantity; scheduleCalc(); }
  });
}

// ─── STEP 5: LOCATION & JOB ──────────────────────────────────────────────────
function bindJobDetails() {
  // ZIP
  const zipInput = document.getElementById('zip-input');
  zipInput.addEventListener('input', e => {
    const z = e.target.value.replace(/\D/g, '').slice(0, 5);
    zipInput.value = z;
    state.zipCode = z;
    state.zipData = null;
    document.getElementById('zip-badge').style.display = 'none';
    if (z.length === 5) {
      clearTimeout(state.zipTimer);
      state.zipTimer = setTimeout(() => lookupZip(z), 600);
    }
    scheduleCalc();
  });

  // Floor
  document.getElementById('floor-btns').addEventListener('click', e => {
    const btn = e.target.closest('[data-floor]');
    if (!btn) return;
    state.floor = parseInt(btn.dataset.floor);
    document.querySelectorAll('#floor-btns .seg-btn').forEach(b => b.classList.toggle('selected', b.dataset.floor === btn.dataset.floor));
    scheduleCalc();
  });

  // Techs
  document.getElementById('tech-btns').addEventListener('click', e => {
    const btn = e.target.closest('[data-tech]');
    if (!btn) return;
    state.numTechs = parseInt(btn.dataset.tech);
    document.querySelectorAll('#tech-btns .sq-btn').forEach(b => b.classList.toggle('selected', b.dataset.tech === btn.dataset.tech));
    scheduleCalc();
  });

  // Urgency
  document.getElementById('urgency-btns').addEventListener('click', e => {
    const btn = e.target.closest('[data-urgency]');
    if (!btn) return;
    state.urgency = btn.dataset.urgency;
    document.querySelectorAll('#urgency-btns .urgency-btn').forEach(b => b.classList.toggle('selected', b.dataset.urgency === btn.dataset.urgency));
    scheduleCalc();
  });

  // Notes
  document.getElementById('notes-input').addEventListener('input', e => {
    state.notes = e.target.value;
  });
}

async function lookupZip(zip) {
  const badge = document.getElementById('zip-badge');
  const loading = document.getElementById('zip-loading');
  loading.style.display = 'inline-flex';
  badge.style.display = 'none';
  try {
    const resp = await fetch(`/api/zip/${zip}`);
    if (!resp.ok) throw new Error();
    const data = await resp.json();
    state.zipData = data;
    const mult = data.multiplier ? '+' + Math.round((data.multiplier - 1) * 100) + '%' : '';
    const travel = data.travel_minutes ? `~${data.travel_minutes}min` : '';
    badge.textContent = `📍 ${data.city || zip}${travel ? ' ' + travel : ''}${mult ? ' ' + mult : ''}`;
    badge.style.display = 'inline-flex';
  } catch(_) {
    badge.style.display = 'none';
  } finally {
    loading.style.display = 'none';
    scheduleCalc();
  }
}

// ─── CALCULATION ─────────────────────────────────────────────────────────────
function scheduleCalc() {
  clearTimeout(state.calcTimer);
  state.calcTimer = setTimeout(() => runCalc(), 400);
}

async function runCalc() {
  if (!state.serviceId) {
    setStatus('Select a product type');
    return;
  }
  const area = calcAreaSqft();
  if (area <= 0) {
    setStatus('Enter dimensions');
    return;
  }

  setStatus('Calculating…');
  document.getElementById('result-spinner').style.display = 'flex';

  const body = {
    service_id: state.serviceId,
    width_ft: state.widthFt,
    width_in: state.widthIn,
    width_frac: state.widthFrac,
    height_ft: state.heightFt,
    height_in: state.heightIn,
    height_frac: state.heightFrac,
    quantity: state.quantity,
    zip_code: state.zipCode || '91324',
    floor: state.floor,
    num_technicians: state.numTechs,
    urgency: state.urgency,
    modifier_ids: state.selectedModifiers,
    notes: state.notes
  };

  try {
    const resp = await fetch('/api/calculate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!resp.ok) throw new Error('calc error');
    const data = await resp.json();
    state.calcResult = data;
    renderResult(data);
    fetchSimilarJobs(state.productKey, data.total_area_sqft || area);
    setStatus('Updated');
  } catch(err) {
    // Fallback: client-side estimate
    const estimate = clientSideEstimate(area);
    state.calcResult = estimate;
    renderResult(estimate);
    setStatus('Estimated (offline)');
  } finally {
    document.getElementById('result-spinner').style.display = 'none';
  }
}

// Client-side fallback estimate
function clientSideEstimate(area) {
  const rates = {
    residential_single: [12, 18], residential_igu: [22, 35], residential_foggy: [18, 28],
    commercial_storefront: [28, 45], commercial_partition: [35, 55], commercial_door: [300, 600],
    shower_door: [400, 900], shower_mirror: [15, 25],
    specialty_tabletop: [20, 35], specialty_custom: [18, 30], specialty_laminated: [30, 50]
  };
  const [rMin, rMax] = rates[state.productKey] || [20, 35];
  const qty = state.quantity;
  const urgMulti = { normal: 1, urgent: 1.30, emergency: 1.50 };
  const floorAdd = { 1: 0, 2: 150, 3: 300 };
  const zipMult = state.zipData?.multiplier || 1;
  const tax = 1.1025;

  const baseMin = area * rMin * qty * urgMulti[state.urgency] * zipMult + (floorAdd[state.floor] || 0);
  const baseMax = area * rMax * qty * urgMulti[state.urgency] * zipMult + (floorAdd[state.floor] || 0);

  return {
    price_min: baseMin * tax,
    price_max: baseMax * tax,
    breakdown: [
      { label: 'Glass (material)', min: area * rMin * qty, max: area * rMax * qty },
      { label: 'Labor', min: 75, max: 150 },
      { label: 'Floor surcharge', min: floorAdd[state.floor] || 0, max: floorAdd[state.floor] || 0 },
      { label: 'Location factor', min: zipMult - 1, max: zipMult - 1, pct: true },
      { label: 'Tax (10.25%)', min: baseMin * 0.1025, max: baseMax * 0.1025 }
    ]
  };
}

function renderResult(data) {
  const section = document.getElementById('result-section');
  section.style.display = 'block';
  section.classList.remove('fade-in');
  void section.offsetWidth;
  section.classList.add('fade-in');

  const priceMin = data.grand_total_min ?? data.price_min;
  const priceMax = data.grand_total_max ?? data.price_max;
  document.getElementById('result-price').textContent = fmtRange(priceMin, priceMax);

  const taxNote = document.getElementById('result-tax-note');
  const meta = [data.service_name, data.total_area_sqft ? data.total_area_sqft + ' sqft' : null, data.location].filter(Boolean).join(' · ');
  taxNote.textContent = (meta ? meta + ' · ' : '') + 'includes LA tax 10.25%';

  const table = document.getElementById('breakdown-table');
  let rowsHtml = '';

  if (Array.isArray(data.breakdown) && data.breakdown.length > 0) {
    rowsHtml = data.breakdown.map(row => {
      const val = row.pct ? (row.min * 100).toFixed(0) + '%' : fmtRange(row.min, row.max);
      return `<div class="breakdown-row"><span class="text-gray-600">${row.label}</span><span class="font-medium text-gray-900">${val}</span></div>`;
    }).join('');
  } else if (data.breakdown && typeof data.breakdown === 'object') {
    const b = data.breakdown;
    const rows = [
      ['Material', fmtRange(b.material_min, b.material_max)],
      ['Labor', fmtRange(b.labor_min, b.labor_max)],
      b.travel_cost > 0 ? ['Travel', fmt(b.travel_cost)] : null,
      b.floor_surcharge > 0 ? ['Floor', fmt(b.floor_surcharge)] : null,
      b.extra_tech_cost > 0 ? ['Extra tech', fmt(b.extra_tech_cost)] : null,
      b.urgency_label ? [b.urgency_label, ''] : null,
      ['Subtotal', fmtRange(data.total_min, data.total_max)],
      ['Tax', fmtRange(data.tax_min, data.tax_max)]
    ].filter(Boolean);
    rowsHtml = rows.map(([l, v]) =>
      `<div class="breakdown-row"><span class="text-gray-600">${l}</span><span class="font-medium text-gray-900">${v}</span></div>`
    ).join('');
  }

  table.innerHTML = rowsHtml
    ? rowsHtml + `<div class="breakdown-row"><span>Total</span><span>${fmtRange(priceMin, priceMax)}</span></div>`
    : `<div class="breakdown-row"><span>Estimated Total</span><span>${fmtRange(priceMin, priceMax)}</span></div>`;
}

// ─── SIMILAR JOBS ─────────────────────────────────────────────────────────────
async function fetchSimilarJobs(productKey, areaSqft) {
  const section = document.getElementById('similar-section');
  const cat = HCP[productKey];
  section.style.cssText = 'display:none';
  if (!cat || !areaSqft) return;
  try {
    const resp = await fetch(`/api/similar-jobs?category=${encodeURIComponent(cat)}&area_sqft=${areaSqft.toFixed(2)}`);
    if (!resp.ok) throw new Error();
    const data = await resp.json();
    if (!data || !data.length) return;
    const rows = data.slice(0, 3);
    const tableHTML = `
      <table class="w-full text-xs">
        <thead><tr class="text-amber-700 border-b border-amber-200">
          <th class="text-left pb-1 font-semibold">Job</th>
          <th class="text-right pb-1 font-semibold">Area</th>
          <th class="text-right pb-1 font-semibold">Price</th>
        </tr></thead>
        <tbody>
          ${rows.map(r => `<tr class="border-b border-amber-100 last:border-0">
            <td class="py-1 pr-2 text-amber-900">#${r.invoice || '—'}</td>
            <td class="py-1 text-right text-amber-700">${r.area_sqft ? r.area_sqft.toFixed(1) + ' sf' : '—'}</td>
            <td class="py-1 text-right font-medium text-amber-900">${r.price ? fmt(r.price) : '—'}</td>
          </tr>
          <tr><td colspan="3" class="pb-2 text-amber-700/80 leading-tight">${(r.description || '').slice(0, 60)}</td></tr>`).join('')}
        </tbody>
      </table>`;
    document.getElementById('similar-table').innerHTML = tableHTML;
    section.style.cssText = 'display:block; background:#FFFBEB; border-color:#FCD34D; border-width:1.5px; border-style:solid; border-radius:12px; padding:12px; margin-bottom:16px;';
    section.classList.remove('fade-in');
    void section.offsetWidth;
    section.classList.add('fade-in');
  } catch(_) {
    section.style.display = 'none';
  }
}

// ─── COPY & PRINT ────────────────────────────────────────────────────────────
document.getElementById('copy-btn').addEventListener('click', () => {
  if (!state.calcResult) return;
  const product = PRODUCT_LABELS[state.productKey]?.label || state.productKey || 'Glass';
  const area = calcAreaSqft();
  const text = [
    'Glass Estimate — Fast Glass & Windows',
    '──────────────────',
    `Service: ${product}`,
    `Size: ${dimLabel()} (${area.toFixed(2)} sqft)`,
    `Quantity: ${state.quantity}`,
    state.zipCode ? `Location: ${state.zipData?.city || state.zipCode}` : null,
    `Floor: ${state.floor}`,
    `Urgency: ${state.urgency}`,
    `Price: ${fmtRange(state.calcResult.grand_total_min ?? state.calcResult.price_min, state.calcResult.grand_total_max ?? state.calcResult.price_max)}`,
    state.notes ? `Notes: ${state.notes}` : null,
    '',
    'Generated by Glass Estimate — Fast Glass & Windows'
  ].filter(Boolean).join('\n');

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ Copied!';
    setTimeout(() => {
      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy';
    }, 2000);
  }).catch(() => {});
});

document.getElementById('print-btn').addEventListener('click', () => {
  window.print();
});

// ─── PRINT STYLES ────────────────────────────────────────────────────────────
const printStyles = document.createElement('style');
printStyles.textContent = `
  @media print {
    header { position: static !important; box-shadow: none !important; border-bottom: 1px solid #E5E7EB !important; }
    body { background: white !important; }
    #copy-btn, #print-btn { display: none !important; }
    .section-card, .result-section { box-shadow: none !important; border: 1px solid #E5E7EB !important; }
  }
`;
document.head.appendChild(printStyles);

// ─── INIT ─────────────────────────────────────────────────────────────────────
function init() {
  bindDimensions();
  bindJobDetails();
  updateAreaPreview();
  renderProducts();
  // Auto-select first product after a short delay
  setTimeout(() => {
    const keys = CAT_MAP[state.category];
    if (keys && keys.length > 0 && !state.productKey) {
      selectProduct(keys[0], SVC[keys[0]]);
    }
  }, 300);
}

init();
</script>
